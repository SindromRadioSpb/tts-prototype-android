<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>OPFS SQLite Init Test</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #e0e0e0; }
    .ok  { color: #4ade80; }
    .err { color: #f87171; }
    .inf { color: #60a5fa; }
    pre  { margin: 4px 0 4px 20px; color: #94a3b8; }
  </style>
</head>
<body>
<h2>OPFS + wa-sqlite Browser Init Test</h2>
<div id="log"></div>

<script type="module">
import {
  initLocalDB, createText, listTexts, getSentences, addSentence,
  upsertNote, listNotes, setProgress, getProgress, recordEvent,
  recentActivity, deleteText, dbDiag, reorderSentences,
  upsertAudioAsset, linkSentenceAudio, getDefaultAudioMap,
  getAnalytics, exportBundle, importBundle
} from '/db/local-db.js';

const log = document.getElementById('log');
function out(cls, msg, extra) {
  const p = document.createElement('p');
  p.className = cls;
  p.textContent = msg;
  log.appendChild(p);
  if (extra != null) {
    const pre = document.createElement('pre');
    pre.textContent = typeof extra === 'object' ? JSON.stringify(extra, null, 2) : String(extra);
    log.appendChild(pre);
  }
}

async function run() {
  // ── ТЕСТ 1: инициализация ─────────────────────────────────────────────
  try {
    out('inf', 'ТЕСТ 1: инициализация wa-sqlite + OPFS...');
    await initLocalDB();
    out('ok', '✅ ТЕСТ 1 ПРОШЁЛ: wa-sqlite инициализирован, OPFS открыт, миграции применены');
  } catch(e) {
    out('err', '❌ ТЕСТ 1 ПРОВАЛЕН: ' + e.message);
    return;
  }

  // ── ТЕСТ 2: диагностика схемы ─────────────────────────────────────────
  try {
    const diag = await dbDiag();
    out('inf', 'ТЕСТ 2: проверка схемы БД...');
    const expectedTables = ['texts','sentences','sentence_notes','audio_assets','srs_cards','text_progress','events','schema_migrations'];
    for (const t of expectedTables) {
      if (!(t in diag)) throw new Error('Таблица отсутствует: ' + t);
    }
    out('ok', '✅ ТЕСТ 2 ПРОШЁЛ: все таблицы созданы', diag);
  } catch(e) {
    out('err', '❌ ТЕСТ 2 ПРОВАЛЕН: ' + e.message);
  }

  // ── ТЕСТ 3: создание и чтение текста ─────────────────────────────────
  const testId  = crypto.randomUUID();
  const testKey = 'opfs-test-' + Date.now();
  try {
    out('inf', 'ТЕСТ 3: создание текста...');
    const created = await createText({
      id: testId,
      text_key: testKey,
      title: 'שלום עולם — тест OPFS',
      source_text: 'שלום עולם',
      level: 'A1',
      tags_json: '["test"]',
    });
    if (!created || created.id !== testId) throw new Error('createText вернул неверный объект');
    const read = await listTexts({ limit: 10 });
    if (!read.find(t => t.id === testId)) throw new Error('Текст не найден после создания');
    out('ok', '✅ ТЕСТ 3 ПРОШЁЛ: текст создан и прочитан', { id: created.id, title: created.title });
  } catch(e) {
    out('err', '❌ ТЕСТ 3 ПРОВАЛЕН: ' + e.message);
  }

  // ── ТЕСТ 4: предложения ───────────────────────────────────────────────
  const sentId = crypto.randomUUID();
  try {
    out('inf', 'ТЕСТ 4: добавление предложения...');
    await addSentence(testId, {
      id: sentId,
      he_plain: 'שלום',
      he_niqqud: 'שָׁלוֹם',
      translit: 'shalom',
      ru: 'мир/привет',
    });
    const sents = await getSentences(testId);
    if (!sents.find(s => s.id === sentId)) throw new Error('Предложение не найдено');
    out('ok', '✅ ТЕСТ 4 ПРОШЁЛ: предложение добавлено', sents[0]);
  } catch(e) {
    out('err', '❌ ТЕСТ 4 ПРОВАЛЕН: ' + e.message);
  }

  // ── ТЕСТ 5: заметки ───────────────────────────────────────────────────
  try {
    out('inf', 'ТЕСТ 5: создание заметки...');
    await upsertNote(testId, sentId, 'Тестовая заметка для OPFS');
    const notes = await listNotes(testId);
    if (!notes.find(n => n.note === 'Тестовая заметка для OPFS')) throw new Error('Заметка не найдена');
    out('ok', '✅ ТЕСТ 5 ПРОШЁЛ: заметка сохранена', notes[0]);
  } catch(e) {
    out('err', '❌ ТЕСТ 5 ПРОВАЛЕН: ' + e.message);
  }

  // ── ТЕСТ 6: прогресс ──────────────────────────────────────────────────
  try {
    out('inf', 'ТЕСТ 6: прогресс чтения...');
    await setProgress(testId, { last_row_idx: 5, last_step_id: 'ru' });
    const prog = await getProgress(testId);
    if (!prog || prog.last_row_idx !== 5) throw new Error('Прогресс не сохранён');
    out('ok', '✅ ТЕСТ 6 ПРОШЁЛ: прогресс записан', prog);
  } catch(e) {
    out('err', '❌ ТЕСТ 6 ПРОВАЛЕН: ' + e.message);
  }

  // ── ТЕСТ 7: события ───────────────────────────────────────────────────
  try {
    out('inf', 'ТЕСТ 7: запись события...');
    await recordEvent({ event_type: 'tts_play', text_id: testId, sentence_id: sentId, source: 'opfs-test' });
    const activity = await recentActivity(5);
    if (!activity.find(e => e.event_type === 'tts_play' && e.text_id === testId))
      throw new Error('Событие не найдено');
    out('ok', '✅ ТЕСТ 7 ПРОШЁЛ: событие записано', activity[0]);
  } catch(e) {
    out('err', '❌ ТЕСТ 7 ПРОВАЛЕН: ' + e.message);
  }

  // ── ТЕСТ 8: OPFS persistence proof ───────────────────────────────────
  try {
    out('inf', 'ТЕСТ 8: проверка OPFS (не localStorage)...');
    localStorage.clear();
    const afterClear = await listTexts({ limit: 10 });
    if (!afterClear.find(t => t.id === testId))
      throw new Error('Текст исчез после localStorage.clear() — данные хранятся в localStorage, не OPFS!');
    out('ok', '✅ ТЕСТ 8 ПРОШЁЛ: данные выживают localStorage.clear() → хранятся в OPFS на устройстве');
  } catch(e) {
    out('err', '❌ ТЕСТ 8 ПРОВАЛЕН: ' + e.message);
  }

  // ── ТЕСТ 9: полный flow "Сохранить как новый" (create + N sentences) ──
  const saveAsNewId = crypto.randomUUID();
  try {
    out('inf', 'ТЕСТ 9: полный flow Save-as-New (createText + addSentence x3)...');
    await createText({
      id: saveAsNewId,
      text_key: 'save-as-new-' + Date.now(),
      title: 'Save-as-New flow test',
      source_text: 'שלום\nכלב\nחתול',
      level: null,
      tags_json: '[]',
      tts_profile_json: 'null',
      source_meta_json: 'null',
    });
    await addSentence(saveAsNewId, { id: crypto.randomUUID(),
      he_plain: 'שלום', he_niqqud: '', translit: 'shalom', translit_ru: 'шалом', ru: 'привет',
      edit_meta_json: null });
    await addSentence(saveAsNewId, { id: crypto.randomUUID(),
      he_plain: 'כלב',  he_niqqud: '', translit: 'kelev',  translit_ru: 'келев',  ru: 'собака',
      edit_meta_json: null });
    await addSentence(saveAsNewId, { id: crypto.randomUUID(),
      he_plain: 'חתול', he_niqqud: '', translit: 'khatul', translit_ru: 'хатуль', ru: 'кошка',
      edit_meta_json: null });
    const savedSents = await getSentences(saveAsNewId);
    if (savedSents.length !== 3) throw new Error('Ожидалось 3 предложения, получено ' + savedSents.length);
    out('ok', '✅ ТЕСТ 9 ПРОШЁЛ: text + 3 sentences созданы и читаются',
        savedSents.map(s => `${s.order_index}: ${s.he_plain} → ${s.ru}`));
  } catch(e) {
    out('err', '❌ ТЕСТ 9 ПРОВАЛЕН: ' + e.message);
  }

  // ── ТЕСТ 10: reorder — провокация UNIQUE-конфликта по (text_id, order_index) ──
  // Регрессия для бага 3.2/3.3: reorderSentences наивно делал последовательные
  // UPDATE order_index, что нарушало UNIQUE-индекс на промежуточных шагах.
  const reorderTextId = crypto.randomUUID();
  try {
    out('inf', 'ТЕСТ 10: reorder с UNIQUE(text_id, order_index)...');
    await createText({
      id: reorderTextId, text_key: 'reorder-' + Date.now(),
      title: 'Reorder regression test', source_text: 'A\nB\nC\nD',
      tags_json: '[]',
    });
    const sids = [crypto.randomUUID(), crypto.randomUUID(), crypto.randomUUID(), crypto.randomUUID()];
    for (let i = 0; i < 4; i++) {
      await addSentence(reorderTextId, { id: sids[i], he_plain: ['A','B','C','D'][i], ru: ['а','б','в','г'][i] });
    }
    // Перестановка: вставляем "C" между "A" и "B"
    const newOrder = [sids[0], sids[2], sids[1], sids[3]];
    await reorderSentences(reorderTextId, newOrder);
    const after = await getSentences(reorderTextId);
    const heByOrder = after.map(s => s.he_plain).join(',');
    if (heByOrder !== 'A,C,B,D') throw new Error('Ожидалось A,C,B,D, получено ' + heByOrder);
    // Проверяем все order_index — должны быть 0,1,2,3 без отрицательных «осколков»
    const indexes = after.map(s => s.order_index).join(',');
    if (indexes !== '0,1,2,3') throw new Error('Ожидалось 0,1,2,3, получено ' + indexes);
    out('ok', '✅ ТЕСТ 10 ПРОШЁЛ: reorder без UNIQUE-конфликта', { order: heByOrder, indexes });
  } catch(e) {
    out('err', '❌ ТЕСТ 10 ПРОВАЛЕН: ' + e.message);
  }

  // ── ТЕСТ 11: audio_asset_key выживает reload (Bug 1+2 регрессия) ──
  // Проверяет, что после `upsertAudioAsset` + `linkSentenceAudio` поле
  // `audio_asset_key` приходит обратно из `getSentences` И из
  // `getDefaultAudioMap` — это то, что нужно классическому table-marker'у,
  // чтобы зеленить кружочек после reload или повторной загрузки текста.
  const audioTextId = crypto.randomUUID();
  try {
    out('inf', 'ТЕСТ 11: audio asset link survives «reload» (getSentences JOIN + getDefaultAudioMap)...');
    await createText({
      id: audioTextId,
      text_key: 'audio-survive-' + Date.now(),
      title: 'Audio link survival regression',
      source_text: 'שלום\nתודה',
      tags_json: '[]',
    });
    const s1 = crypto.randomUUID();
    const s2 = crypto.randomUUID();
    await addSentence(audioTextId, { id: s1, he_plain: 'שלום', ru: 'привет' });
    await addSentence(audioTextId, { id: s2, he_plain: 'תודה', ru: 'спасибо' });

    // Имитируем то, что делает v3RowTtsTrackPlay при play в LOCAL_MODE
    const fakeProfile = JSON.stringify({ language: 'he-IL', voiceName: 'iw-IL-Wavenet-A', speakingRate: 1, pitch: 0 });
    const a1 = await upsertAudioAsset({
      id: crypto.randomUUID(),
      asset_key: 'fakeAssetKey1_' + Date.now(),
      asset_type: 'row',
      relative_path: 'audio-cache/fakeAssetKey1.mp3',
      mime: 'audio/mpeg',
      tts_profile_json: fakeProfile,
    });
    const a2 = await upsertAudioAsset({
      id: crypto.randomUUID(),
      asset_key: 'fakeAssetKey2_' + Date.now(),
      asset_type: 'row',
      relative_path: 'audio-cache/fakeAssetKey2.mp3',
      mime: 'audio/mpeg',
      tts_profile_json: fakeProfile,
    });
    await linkSentenceAudio(s1, a1.id, 1);
    await linkSentenceAudio(s2, a2.id, 1);

    // А теперь — артефакт: getSentences (после моего LEFT JOIN) должен
    // отдавать audio_asset_key прямо в строке, без отдельного getDefaultAudioMap.
    const reloaded = await getSentences(audioTextId);
    if (reloaded.length !== 2) throw new Error('Ожидалось 2 предложения, получено ' + reloaded.length);
    for (const s of reloaded) {
      if (!s.audio_asset_key) throw new Error('audio_asset_key не пришёл из getSentences для ' + s.he_plain);
      if (!s.audio_tts_profile_json) throw new Error('audio_tts_profile_json не пришёл для ' + s.he_plain);
    }
    // Проверка getDefaultAudioMap (его использует v3ClassicEnrichSavedRows fallback)
    const map = await getDefaultAudioMap(audioTextId);
    if (!map[s1] || !map[s2]) throw new Error('getDefaultAudioMap пропустил один из sentence_id');

    out('ok', '✅ ТЕСТ 11 ПРОШЁЛ: audio link survives reload', {
      sentenceCount: reloaded.length,
      audioKeysFromGetSentences: reloaded.map(s => `${s.he_plain}: ${s.audio_asset_key}`),
      audioKeysFromGetDefaultAudioMap: Object.entries(map),
    });
  } catch(e) {
    out('err', '❌ ТЕСТ 11 ПРОВАЛЕН: ' + e.message);
  }

  // ── ТЕСТ 12: getAnalytics — агрегаты по events (Phase 3) ──────────────
  // Покрывает: { ok, period, all } shape; plays/unique_rows/unique_texts.
  // Создаём событие, проверяем счётчики.
  const analyticsTextId = crypto.randomUUID();
  try {
    out('inf', 'ТЕСТ 12: getAnalytics — агрегаты по events...');
    await createText({
      id: analyticsTextId,
      text_key: 'analytics-' + Date.now(),
      title: 'Analytics aggregation test',
      source_text: 'שלום',
      tags_json: '[]',
    });
    const analyticsSid = crypto.randomUUID();
    await addSentence(analyticsTextId, { id: analyticsSid, he_plain: 'שלום', ru: 'привет' });
    // Запишем три ROW_TTS события для одного предложения.
    await recordEvent({ event_type: 'ROW_TTS', text_id: analyticsTextId, sentence_id: analyticsSid, source: 'test1' });
    await recordEvent({ event_type: 'row_tts', text_id: analyticsTextId, sentence_id: analyticsSid, source: 'test2' });
    await recordEvent({ event_type: 'row_tts', text_id: analyticsTextId, sentence_id: analyticsSid, source: 'test3' });
    const a = await getAnalytics({ days: 7, includeArchived: false });
    if (!a || !a.ok) throw new Error('getAnalytics не вернул { ok: true }');
    if (!a.period || !a.all) throw new Error('Нет period/all в ответе');
    if (Number(a.period.plays) < 3) throw new Error('period.plays < 3 (' + a.period.plays + ')');
    if (Number(a.period.unique_rows) < 1) throw new Error('period.unique_rows < 1');
    if (Number(a.period.unique_texts) < 1) throw new Error('period.unique_texts < 1');
    out('ok', '✅ ТЕСТ 12 ПРОШЁЛ: агрегаты корректны', {
      period: a.period,
      all: { plays: a.all.plays, unique_rows: a.all.unique_rows, unique_texts: a.all.unique_texts }
    });
  } catch(e) {
    out('err', '❌ ТЕСТ 12 ПРОВАЛЕН: ' + e.message);
  }

  // ── ТЕСТ 13: exportBundle emits unified Android-v2 format ─────────────
  // Покрывает: непустой результат для non-archived (регрессия) + поля
  // unified формата (text_id/rows/hebrew_plain) + manifest.app_id +
  // library_json_path + audio_assets массив.
  const exportTextId = crypto.randomUUID();
  try {
    out('inf', 'ТЕСТ 13: exportBundle unified format (Android-v2 совместимый)...');
    await createText({
      id: exportTextId,
      text_key: 'export-non-archived-' + Date.now(),
      title: 'Bundle export regression',
      source_text: 'שלום',
      tags_json: '[]',
    });
    await addSentence(exportTextId, { id: crypto.randomUUID(), he_plain: 'שלום', ru: 'привет' });

    const bundle = await exportBundle({ includeArchived: false });
    if (!bundle || !bundle.manifest) throw new Error('bundle.manifest отсутствует');
    if (bundle.manifest.app_id !== 'linguist-pro-web') throw new Error('manifest.app_id не "linguist-pro-web"');
    if (bundle.manifest.export_schema_version !== 1) throw new Error('manifest.export_schema_version != 1');
    if (bundle.manifest.library_json_path !== 'library/library.json') throw new Error('manifest.library_json_path неверный');
    if (!bundle.library || !Array.isArray(bundle.library.texts)) throw new Error('bundle.library.texts отсутствует');
    if (!Array.isArray(bundle.library.audio_assets)) throw new Error('bundle.library.audio_assets отсутствует');
    const found = bundle.library.texts.find(x => x.text_id === exportTextId);
    if (!found) throw new Error('text не найден в library.texts (по text_id)');
    if (!Array.isArray(found.rows) || !found.rows.length) throw new Error('у текста нет rows');
    const r0 = found.rows[0];
    if (!r0.row_id) throw new Error('row.row_id отсутствует');
    if (r0.hebrew_plain !== 'שלום') throw new Error('row.hebrew_plain неверно: ' + r0.hebrew_plain);
    if (r0.russian !== 'привет') throw new Error('row.russian неверно: ' + r0.russian);

    out('ok', '✅ ТЕСТ 13 ПРОШЁЛ: bundle в unified Android-v2 формате', {
      manifest: bundle.manifest,
      first_text: { text_id: found.text_id, title: found.title, rows_count: found.rows.length },
      first_row: { row_id: r0.row_id, hebrew_plain: r0.hebrew_plain, russian: r0.russian },
      audio_assets_count: bundle.library.audio_assets.length,
    });
  } catch(e) {
    out('err', '❌ ТЕСТ 13 ПРОВАЛЕН: ' + e.message);
  }

  // ── ТЕСТ 14: importBundle принимает unified Android-v2 ZIP ─────────────
  // Покрывает: round-trip export → import без потерь, включая audio links.
  // Артефакт совместимости с library-bundle-top100maco-150verb-150pril.zip:
  // если этот тест зелёный, тот ZIP-файл импортируется без потерь данных.
  const roundTextId = crypto.randomUUID();
  let roundImportedTextKey = null;
  try {
    out('inf', 'ТЕСТ 14: round-trip exportBundle → importBundle (unified)...');
    roundImportedTextKey = 'roundtrip-' + Date.now();
    await createText({
      id: roundTextId,
      text_key: roundImportedTextKey,
      title: 'Roundtrip text',
      source_text: 'תודה',
      tags_json: '[]',
    });
    const sid = crypto.randomUUID();
    await addSentence(roundTextId, { id: sid, he_plain: 'תודה', he_niqqud: 'תּוֹדָה', translit: 'toda', ru: 'спасибо' });

    // Add an audio link so the round-trip carries provenance.
    const fakeKey = 'fakeRoundTripKey_' + Date.now();
    const fakeProfile = JSON.stringify({ language: 'he-IL', voiceName: 'iw-IL-Wavenet-A', speakingRate: 1, pitch: 0 });
    const a = await upsertAudioAsset({
      id: crypto.randomUUID(),
      asset_key: fakeKey,
      asset_type: 'row',
      relative_path: 'audio-cache/' + fakeKey + '.mp3',
      mime: 'audio/mpeg',
      tts_profile_json: fakeProfile,
    });
    await linkSentenceAudio(sid, a.id, 1);

    const exported = await exportBundle({ includeArchived: false });

    // Verify exported bundle carries the audio_asset_key + provenance.
    const expText = exported.library.texts.find(t => t.text_id === roundTextId);
    if (!expText) throw new Error('exported bundle: text не найден');
    const expRow = (expText.rows || []).find(r => r.audio_asset_key === fakeKey);
    if (!expRow) throw new Error('exported bundle: row.audio_asset_key не найден');
    const expAA = (exported.library.audio_assets || []).find(a => a.asset_key === fakeKey);
    if (!expAA) throw new Error('exported bundle: audio_asset_key не в audio_assets[]');
    if (!expAA.provenance || !expAA.provenance.ttsProfile) throw new Error('exported bundle: провенанс ttsProfile не сохранён');

    // Delete original and re-import.
    await deleteText(roundTextId);
    const r = await importBundle(exported, { mode: 'skip' });
    if (!r || r.imported < 1) throw new Error('importBundle: imported < 1: ' + JSON.stringify(r));

    // Verify the imported text carries audio_asset_key on its row.
    const imported = (await listTexts({ limit: 1000 })).find(t => t.text_key === roundImportedTextKey);
    if (!imported) throw new Error('imported text не найден в listTexts');
    const importedSents = await getSentences(imported.id);
    if (!importedSents.length) throw new Error('imported text: нет sentences');
    const importedSent = importedSents[0];
    if (importedSent.audio_asset_key !== fakeKey) {
      throw new Error('imported sentence: audio_asset_key не сохранён (' + importedSent.audio_asset_key + ' vs ' + fakeKey + ')');
    }

    out('ok', '✅ ТЕСТ 14 ПРОШЁЛ: round-trip работает + audio link сохранён', {
      imported: r.imported,
      skipped: r.skipped,
      errors: r.errors.length,
      roundtrip_audio_asset_key: importedSent.audio_asset_key,
      roundtrip_audio_tts_profile_json: importedSent.audio_tts_profile_json,
    });

    // Cleanup roundtrip-imported text so subsequent test runs find OPFS clean.
    await deleteText(imported.id);
  } catch(e) {
    out('err', '❌ ТЕСТ 14 ПРОВАЛЕН: ' + e.message);
  }

  // ── ТЕСТ 15: edit translit + reload — value persists ─────────────────
  // Регрессия для бага 1.2: пользователь редактирует Translit-ячейку,
  // делает reload, видит старое значение. Этот тест прогоняет тот же путь
  // что использует tableEditSaveCell в LOCAL_MODE: updateSentence с
  // { translit: NEW, edit_meta_json: {...edited:{translit:true}...} },
  // потом перечитывает getSentences и проверяет что translit обновился.
  const editTextId = crypto.randomUUID();
  try {
    out('inf', 'ТЕСТ 15: edit translit + reload — translit persists...');
    await createText({
      id: editTextId, text_key: 'edit-translit-' + Date.now(),
      title: 'Edit translit regression', source_text: 'שלום',
      tags_json: '[]',
    });
    const sid = crypto.randomUUID();
    await addSentence(editTextId, {
      id: sid, he_plain: 'שלום', he_niqqud: 'שָׁלוֹם',
      translit: 'shalom (OLD)', translit_ru: 'шалом (OLD)',
      ru: 'мир',
    });

    // Mimic tableEditSaveCell LOCAL_MODE branch: build edit_meta_json + update.
    const newMeta = JSON.stringify({ edited: { translit: true } });
    const fullPayload = { translit: 'shalom (NEW)', edit_meta_json: newMeta };
    await (await import('/db/local-db.js')).updateSentence(editTextId, sid, fullPayload);

    // Simulate reload: re-read via getSentences
    const reloaded = await getSentences(editTextId);
    if (!reloaded.length) throw new Error('getSentences вернул пустой массив');
    const r = reloaded[0];
    if (r.translit !== 'shalom (NEW)') {
      throw new Error('translit не обновился: ожидалось "shalom (NEW)", получено "' + r.translit + '"');
    }
    let parsedMeta = null;
    try { parsedMeta = r.edit_meta_json ? JSON.parse(r.edit_meta_json) : null; } catch (_) {}
    if (!parsedMeta || !parsedMeta.edited || !parsedMeta.edited.translit) {
      throw new Error('edit_meta_json.edited.translit не записан: ' + r.edit_meta_json);
    }

    // Now also test translit_ru update (ru-phonetic profile path)
    const fullPayload2 = { translit_ru: 'шалом (NEW)', edit_meta_json: JSON.stringify({ edited: { translit: true, translit_ru: true } }) };
    await (await import('/db/local-db.js')).updateSentence(editTextId, sid, fullPayload2);
    const reloaded2 = await getSentences(editTextId);
    const r2 = reloaded2[0];
    if (r2.translit_ru !== 'шалом (NEW)') {
      throw new Error('translit_ru не обновился: ожидалось "шалом (NEW)", получено "' + r2.translit_ru + '"');
    }
    if (r2.translit !== 'shalom (NEW)') {
      throw new Error('translit потерян после translit_ru update: ' + r2.translit);
    }

    out('ok', '✅ ТЕСТ 15 ПРОШЁЛ: translit + translit_ru сохраняются после reload', {
      translit: r2.translit,
      translit_ru: r2.translit_ru,
      edit_meta: r2.edit_meta_json,
    });
  } catch(e) {
    out('err', '❌ ТЕСТ 15 ПРОВАЛЕН: ' + e.message);
  }

  // ── ТЕСТ 16: notes integrity audit (D4) ───────────────────────────────
  // Verifies the FK + cascade behavior of sentence_notes and notes
  // round-trip through exportBundle → importBundle.
  //   1. Notes survive ZIP roundtrip (no truncation, no orphan loss).
  //   2. Multi-line + Unicode + edge-case content is preserved byte-for-byte.
  //   3. Deleting a sentence cascades to its note (FK ON DELETE CASCADE).
  //   4. After deleteText, no orphan notes survive (CASCADE through texts→sentences→notes).
  const notesAuditTextId = crypto.randomUUID();
  try {
    out('inf', 'ТЕСТ 16: notes integrity (no orphans, no truncation, roundtrip)...');
    await createText({
      id: notesAuditTextId, text_key: 'notes-audit-' + Date.now(),
      title: 'Notes audit', source_text: 'שלום עולם', tags_json: '[]',
    });
    const sid1 = crypto.randomUUID();
    const sid2 = crypto.randomUUID();
    const sid3 = crypto.randomUUID();
    await addSentence(notesAuditTextId, { id: sid1, he_plain: 'שלום', he_niqqud: 'שָׁלוֹם', translit: 'shalom', translit_ru: 'шалом', ru: 'мир', order_index: 0 });
    await addSentence(notesAuditTextId, { id: sid2, he_plain: 'עולם', he_niqqud: 'עוֹלָם', translit: 'olam',   translit_ru: 'олам',  ru: 'мир2', order_index: 1 });
    await addSentence(notesAuditTextId, { id: sid3, he_plain: 'תודה', he_niqqud: 'תּוֹדָה', translit: 'toda',   translit_ru: 'тода',  ru: 'спасибо', order_index: 2 });

    // Edge-case note bodies: multi-line, Unicode emoji, Hebrew, RTL marks, JSON-looking, very long.
    const longNote = 'A'.repeat(2000);  // ~2 KB — way past any ASCII string truncation point.
    const note1 = 'строка 1\nстрока 2\n\nс пустой строкой\n— тире\n💡 emoji\n‎это LRM‏ это RLM';
    const note2 = '{"looks":"like JSON","but":"isn\'t parsed"}';
    const note3 = longNote;
    await upsertNote(notesAuditTextId, sid1, note1);
    await upsertNote(notesAuditTextId, sid2, note2);
    await upsertNote(notesAuditTextId, sid3, note3);

    // 1. Re-read and verify exact preservation.
    const notesAfter = await listNotes(notesAuditTextId);
    if (notesAfter.length !== 3) throw new Error('Ожидалось 3 заметки, получено ' + notesAfter.length);
    const byId = Object.create(null);
    for (const n of notesAfter) byId[(n.sentenceId ?? n.sentence_id)] = n.note;
    if (byId[sid1] !== note1) throw new Error('Многострочная/Unicode-заметка изменилась после reload');
    if (byId[sid2] !== note2) throw new Error('JSON-подобная заметка изменилась');
    if (byId[sid3] !== note3) throw new Error('Длинная заметка (2KB) изменилась — длина: ' + (byId[sid3] || '').length);

    // 2. exportBundle → importBundle roundtrip.
    const bundle = await exportBundle({ includeArchived: false, textIds: [notesAuditTextId] });
    if (!bundle || !bundle.library) throw new Error('exportBundle вернул нет library');
    // Verify rows in the bundle carry .note field
    const exportedTextEntry = (bundle.library.texts || []).find(t => t.text_id === notesAuditTextId);
    if (!exportedTextEntry) throw new Error('exportBundle не нашёл текст по text_id');
    const noteRows = (exportedTextEntry.rows || []).filter(r => r.note && String(r.note).length);
    if (noteRows.length !== 3) throw new Error('В bundle.rows прошло ' + noteRows.length + ' заметок (ожидалось 3)');

    // Wipe original, then re-import.
    await deleteText(notesAuditTextId);
    const r = await importBundle(bundle, { mode: 'skip' });
    if (r.imported !== 1) throw new Error('importBundle imported=' + r.imported + ' вместо 1');
    // text_key was preserved → find the new text by it.
    const reimported = (await listTexts({ limit: 100 })).find(t => t.text_key === exportedTextEntry.text_key);
    if (!reimported) throw new Error('Импортированный текст не найден по text_key');
    const reNotes = await listNotes(reimported.id);
    if (reNotes.length !== 3) throw new Error('После roundtrip заметок: ' + reNotes.length + ' (ожидалось 3)');
    const reByText = reNotes.map(n => n.note).sort();
    const expectedSorted = [note1, note2, note3].sort();
    for (let i = 0; i < 3; i++) {
      if (reByText[i] !== expectedSorted[i]) throw new Error('Заметка #' + i + ' изменилась через roundtrip; len before/after: ' + expectedSorted[i].length + '/' + reByText[i].length);
    }

    // 3. Cascade: delete the reimported text — all notes must vanish.
    await deleteText(reimported.id);
    const orphans = await listNotes(reimported.id);
    if (orphans.length !== 0) throw new Error('Найдены orphan notes после deleteText: ' + orphans.length);

    out('ok', '✅ ТЕСТ 16 ПРОШЁЛ: notes survive roundtrip без потерь и truncation, CASCADE работает', {
      notesBefore: 3,
      notesAfterRoundtrip: reNotes.length,
      longestNoteBytes: note3.length,
    });
  } catch(e) {
    out('err', '❌ ТЕСТ 16 ПРОВАЛЕН: ' + e.message);
    // Best-effort cleanup if test threw mid-run.
    try { await deleteText(notesAuditTextId); } catch (_) {}
  }

  // ── Cleanup ───────────────────────────────────────────────────────────
  try {
    await deleteText(testId);
    await deleteText(saveAsNewId);
    await deleteText(reorderTextId);
    await deleteText(audioTextId);
    await deleteText(analyticsTextId);
    await deleteText(exportTextId);
    await deleteText(editTextId);
    try { await deleteText(notesAuditTextId); } catch (_) {}
    out('inf', '(тестовые данные удалены)');
  } catch(e) { /* ignore */ }

  // ── OPFS path info ────────────────────────────────────────────────────
  try {
    const root = await navigator.storage.getDirectory();
    const entries = [];
    for await (const [name] of root.entries()) entries.push(name);
    out('inf', '📁 Файлы в OPFS root:', entries);
  } catch(e) { out('inf', 'OPFS listing недоступен: ' + e.message); }

  out('ok', '\n🎉 Все тесты завершены. Данные хранятся локально в OPFS вашего браузера.');
}

run().catch(e => out('err', '💥 Критическая ошибка: ' + e.message));
</script>
