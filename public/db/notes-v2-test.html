<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Notes v2 Schema Test (Phase 9.1.A)</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #e0e0e0; max-width: 1100px; margin: 0 auto; }
    h2 { color: #fbbf24; }
    .ok { color: #4ade80; }
    .err { color: #f87171; }
    .inf { color: #60a5fa; }
    .warn { color: #fbbf24; }
    pre { margin: 4px 0 4px 20px; color: #94a3b8; white-space: pre-wrap; }
  </style>
</head>
<body>
<h2>Notes v2 — Schema migration test (Phase 9.1.A)</h2>
<p class="inf">Verifies migrations 021–025: polymorphic notes_v2, note_versions, note_links, roots, and the sentence_notes → notes_v2 data migration with backwards-compat VIEW.</p>
<div id="log"></div>

<script type="module">
import {
  initLocalDB, recordEvent,
  upsertNote, listNotes, deleteNote, searchNotes,
  createText, addSentence, deleteText,
  dbQuery, dbRun,
  // Phase 9.1.B polymorphic API
  createNote, updateNote, deleteNoteById, getNoteById,
  listNotesByTarget, listAllNotesForText, searchAllNotes,
  listNoteVersions, restoreNoteVersion,
  // Phase 9.3.5 R2.1 + R3
  listNotesForRow, getRowNoteCounts, convertNoteType,
  setNoteLinks, listOutgoingLinks, listBacklinks,
  seedRoots, searchRootsAutocomplete,
  getNotesSmartCollectionsSummary, getTextIdsForNotesSmartChip,
  resolveNote,
  // Phase 9.1.D bundle roundtrip
  exportBundle, importBundle,
  // Phase 9.3.C SRS namespace
  srs,
} from '/db/local-db.js';

const log = document.getElementById('log');
function out(cls, msg, extra) {
  const p = document.createElement('p');
  p.className = cls;
  p.textContent = msg;
  log.appendChild(p);
  if (extra != null) {
    const pre = document.createElement('pre');
    pre.textContent = typeof extra === 'object' ? JSON.stringify(extra, null, 2) : String(extra);
    log.appendChild(pre);
  }
}

async function run() {
  let pass = 0, fail = 0;
  const t = (name, fn) => async () => {
    try { await fn(); pass++; out('ok', '✅ ' + name); }
    catch (e) { fail++; out('err', '❌ ' + name + ' — ' + (e && e.message ? e.message : String(e))); }
  };

  try {
    out('inf', 'Initializing OPFS + wa-sqlite + migrations 001–025...');
    await initLocalDB();
    out('ok', '✅ Init complete (all 25 migrations applied)');
  } catch (e) {
    out('err', '❌ Init failed: ' + e.message);
    return;
  }

  // We don't have a `q` export — use a small fetch-based diag through
  // dbDiag if exposed, or interrogate via known APIs. Let's call into
  // window.__localDB.q if it leaks; otherwise use the existing helpers.
  const ldb = { q: dbQuery, r: dbRun, createText, addSentence, deleteText };
  const hasQ = true;

  // ── Migration 021: notes_v2 table exists with expected columns ────
  await t('notes_v2 table exists', async () => {
    if (!hasQ) return; // soft-skip
    const rows = await ldb.q(`SELECT name FROM sqlite_master WHERE type='table' AND name='notes_v2'`);
    if (!rows.length) throw new Error('table notes_v2 not found');
  })();

  await t('notes_v2 has all expected columns', async () => {
    if (!hasQ) return;
    const cols = await ldb.q(`PRAGMA table_info(notes_v2)`);
    const names = new Set(cols.map(r => r.name));
    const want = ['id','target_kind','target_id','text_id','note_type','title',
                  'body_json','audio_anchor_ms','audio_asset_key','srs_card_id',
                  'created_at','updated_at'];
    for (const w of want) if (!names.has(w)) throw new Error('missing column ' + w);
  })();

  await t('notes_v2 indexes present', async () => {
    if (!hasQ) return;
    const idx = await ldb.q(`SELECT name FROM sqlite_master WHERE type='index' AND tbl_name='notes_v2'`);
    const names = new Set(idx.map(r => r.name));
    for (const n of ['ix_notes_v2_target','ix_notes_v2_text','ix_notes_v2_type',
                     'ix_notes_v2_audio','ix_notes_v2_srs','ix_notes_v2_updated_at']) {
      if (!names.has(n)) throw new Error('missing index ' + n);
    }
  })();

  // ── Migration 022: note_versions ──────────────────────────────────
  await t('note_versions table exists', async () => {
    if (!hasQ) return;
    const rows = await ldb.q(`SELECT name FROM sqlite_master WHERE type='table' AND name='note_versions'`);
    if (!rows.length) throw new Error('not found');
  })();

  // ── Migration 023: note_links ─────────────────────────────────────
  await t('note_links table + ix_note_links_to index exist', async () => {
    if (!hasQ) return;
    const tbl = await ldb.q(`SELECT name FROM sqlite_master WHERE type='table' AND name='note_links'`);
    if (!tbl.length) throw new Error('table not found');
    const idx = await ldb.q(`SELECT name FROM sqlite_master WHERE type='index' AND name='ix_note_links_to'`);
    if (!idx.length) throw new Error('index not found');
  })();

  // ── Migration 024: roots ──────────────────────────────────────────
  await t('roots table exists with expected columns', async () => {
    if (!hasQ) return;
    const cols = await ldb.q(`PRAGMA table_info(roots)`);
    const names = new Set(cols.map(r => r.name));
    for (const n of ['root_3letter','gloss','my_note_id']) {
      if (!names.has(n)) throw new Error('missing column ' + n);
    }
  })();

  // ── Migration 025: sentence_notes is now a VIEW; backwards-compat works
  await t('sentence_notes is now a VIEW (not a table)', async () => {
    if (!hasQ) return;
    const rows = await ldb.q(`SELECT type FROM sqlite_master WHERE name='sentence_notes'`);
    if (!rows.length) throw new Error('sentence_notes neither table nor view');
    if (rows[0].type !== 'view') throw new Error('expected view, got ' + rows[0].type);
  })();

  // Create a fresh text + sentence to test note operations against
  let testTextId, testSentenceId;
  await t('setup: createText + addSentence (for note operations)', async () => {
    const tid = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : 'tid-' + Date.now();
    const tx = await ldb.createText({
      id: tid,
      text_key: 'notes-v2-test-' + Date.now(),
      title: 'Notes v2 Test Text',
      level: 'beginner',
      source_text: 'בדיקה',
    });
    if (!tx) throw new Error('createText returned ' + tx);
    testTextId = tx.id;
    const sid = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : 'sid-' + Date.now();
    // addSentence is a void operation; sentence_id is whatever we passed in.
    await ldb.addSentence(testTextId, {
      id: sid,
      order_index: 0,
      he_plain: 'בדיקה',
      ru: 'тест',
    });
    testSentenceId = sid;
  })();

  // ── Backwards-compat: upsertNote → reads via VIEW ─────────────────
  await t('upsertNote inserts into notes_v2 (currently still writes to legacy path — Phase 9.1.B will rewrite)', async () => {
    // upsertNote currently still references "sentence_notes" as a table.
    // After 025 migration, that table is now a VIEW (read-only). So
    // upsertNote will FAIL until 9.1.B rewrites the API. This test
    // EXPECTS failure right now and confirms the issue is identified.
    let failed = false;
    try {
      await upsertNote(testTextId, testSentenceId, 'Test note via upsertNote (should fail until 9.1.B)');
    } catch (e) {
      failed = true;
    }
    if (!failed) {
      // If it succeeds, that's actually fine — SQLite may have allowed
      // INSERT on the VIEW via INSTEAD OF triggers (we did not add such
      // triggers, so this would be a surprise). Verify the row landed
      // somewhere readable.
      const ns = await listNotes(testTextId);
      if (!ns.length) throw new Error('upsertNote silently dropped — no row visible');
      out('warn', '   ⚠ upsertNote unexpectedly succeeded against VIEW; investigate before 9.1.B.');
    } else {
      out('inf', '   ℹ upsertNote correctly fails against the new VIEW (will be rewritten in Phase 9.1.B).');
    }
  })();

  // Direct insert into notes_v2 to verify schema works
  await t('direct insert into notes_v2 (free note via VIEW-friendly path)', async () => {
    if (!hasQ) return;
    const id = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : 'n-' + Date.now();
    await ldb.r(
      `INSERT INTO notes_v2 (id, target_kind, target_id, text_id, note_type, body_json)
       VALUES (?, 'sentence', ?, ?, 'free', json_object('markdown', ?))`,
      [id, testSentenceId, testTextId, 'Direct insert test note']
    );
    const back = await ldb.q(`SELECT * FROM notes_v2 WHERE id = ?`, [id]);
    if (!back.length) throw new Error('row not readable after insert');
    if (back[0].target_kind !== 'sentence') throw new Error('target_kind wrong');
    if (back[0].note_type !== 'free') throw new Error('note_type wrong');
    if (!back[0].body_json.includes('Direct insert')) throw new Error('body_json missing content');
  })();

  // VIEW reads back successfully through legacy column names
  await t('sentence_notes VIEW returns the row via legacy schema', async () => {
    if (!hasQ) return;
    const rows = await ldb.q(`SELECT * FROM sentence_notes WHERE text_id = ?`, [testTextId]);
    if (!rows.length) throw new Error('view returned 0 rows');
    if (typeof rows[0].sentence_id === 'undefined') throw new Error('view missing sentence_id column');
    if (typeof rows[0].note === 'undefined') throw new Error('view missing note column');
    out('inf', '   sentence_notes VIEW row: ' + JSON.stringify({
      sentence_id: rows[0].sentence_id, note_preview: String(rows[0].note).slice(0, 30)
    }));
  })();

  // ── CHECK constraints ─────────────────────────────────────────────
  await t('CHECK rejects body_json > 64k chars', async () => {
    if (!hasQ) return;
    const huge = JSON.stringify({ markdown: 'x'.repeat(70000) });
    if (huge.length <= 65536) throw new Error('test setup wrong; expected > 65536');
    const id = 'huge-' + Date.now();
    let rejected = false;
    try {
      await ldb.r(
        `INSERT INTO notes_v2 (id, target_kind, target_id, text_id, body_json) VALUES (?, 'sentence', ?, ?, ?)`,
        [id, testSentenceId, testTextId, huge]
      );
    } catch (e) { rejected = true; }
    if (!rejected) throw new Error('64k cap CHECK did not fire');
  })();

  await t('CHECK rejects invalid JSON in body_json', async () => {
    if (!hasQ) return;
    const id = 'badjson-' + Date.now();
    let rejected = false;
    try {
      await ldb.r(
        `INSERT INTO notes_v2 (id, target_kind, target_id, text_id, body_json) VALUES (?, 'sentence', ?, ?, ?)`,
        [id, testSentenceId, testTextId, 'this is not json']
      );
    } catch (e) { rejected = true; }
    if (!rejected) throw new Error('json_valid CHECK did not fire');
  })();

  await t('CHECK rejects unknown target_kind', async () => {
    if (!hasQ) return;
    const id = 'badkind-' + Date.now();
    let rejected = false;
    try {
      await ldb.r(
        `INSERT INTO notes_v2 (id, target_kind, body_json) VALUES (?, 'planet', '{}')`,
        [id]
      );
    } catch (e) { rejected = true; }
    if (!rejected) throw new Error('target_kind enum CHECK did not fire');
  })();

  await t('CHECK rejects unknown note_type', async () => {
    if (!hasQ) return;
    const id = 'badtype-' + Date.now();
    let rejected = false;
    try {
      await ldb.r(
        `INSERT INTO notes_v2 (id, target_kind, note_type, body_json) VALUES (?, 'free', 'haiku', '{}')`,
        [id]
      );
    } catch (e) { rejected = true; }
    if (!rejected) throw new Error('note_type enum CHECK did not fire');
  })();

  // ── note_versions FK CASCADE ──────────────────────────────────────
  await t('note_versions FK cascades on note delete', async () => {
    if (!hasQ) return;
    const noteId = 'nv-test-' + Date.now();
    await ldb.r(
      `INSERT INTO notes_v2 (id, target_kind, target_id, text_id, body_json)
       VALUES (?, 'sentence', ?, ?, json_object('markdown','v1'))`,
      [noteId, testSentenceId, testTextId]
    );
    await ldb.r(
      `INSERT INTO note_versions (note_id, version, body_json)
       VALUES (?, 1, json_object('markdown','v1'))`,
      [noteId]
    );
    const before = await ldb.q(`SELECT COUNT(*) AS c FROM note_versions WHERE note_id = ?`, [noteId]);
    if (Number(before[0].c) !== 1) throw new Error('version not inserted');
    await ldb.r(`DELETE FROM notes_v2 WHERE id = ?`, [noteId]);
    const after = await ldb.q(`SELECT COUNT(*) AS c FROM note_versions WHERE note_id = ?`, [noteId]);
    if (Number(after[0].c) !== 0) throw new Error('cascade did not fire');
  })();

  // ── note_links to_kind constraint ─────────────────────────────────
  await t('note_links to_kind CHECK fires for unknown kind', async () => {
    if (!hasQ) return;
    let rejected = false;
    try {
      await ldb.r(
        `INSERT INTO note_links (from_note_id, to_kind, to_id) VALUES ('x', 'fish', 'y')`,
        []
      );
    } catch (e) { rejected = true; }
    if (!rejected) throw new Error('to_kind CHECK did not fire');
  })();

  // ── Cleanup: deleteText cascades to notes_v2 ──────────────────────
  await t('deleteText cascades into notes_v2 (via FK ON DELETE CASCADE)', async () => {
    if (!hasQ) return;
    const before = await ldb.q(`SELECT COUNT(*) AS c FROM notes_v2 WHERE text_id = ?`, [testTextId]);
    if (Number(before[0].c) === 0) {
      out('warn', '   (test text already had no notes — cleaning anyway)');
    }
    await ldb.deleteText(testTextId);
    const after = await ldb.q(`SELECT COUNT(*) AS c FROM notes_v2 WHERE text_id = ?`, [testTextId]);
    if (Number(after[0].c) !== 0) throw new Error('cascade did not fire');
  })();

  // ── Phase 9.1.B — polymorphic API ────────────────────────────────

  // Setup another text + sentence for fresh polymorphic tests (the
  // earlier setup text was deleted by the cascade test above).
  let phB_textId, phB_sentenceId;
  await t('phase 9.1.B setup: createText + addSentence', async () => {
    const tid = crypto.randomUUID();
    const tx = await ldb.createText({
      id: tid, text_key: 'phB-test-' + Date.now(),
      title: 'Phase 9.1.B Test Text', source_text: 'בדיקה ב',
    });
    phB_textId = tx.id;
    const sid = crypto.randomUUID();
    await ldb.addSentence(phB_textId, { id: sid, order_index: 0, he_plain: 'בדיקה ב', ru: 'тест Б' });
    phB_sentenceId = sid;
  })();

  // upsertNote (legacy contract) now writes through the new schema
  let upsertedNoteId;
  await t('upsertNote (legacy backwards-compat) now writes to notes_v2', async () => {
    const row = await upsertNote(phB_textId, phB_sentenceId, 'Initial note body');
    if (!row) throw new Error('upsertNote returned null');
    if (row.note !== 'Initial note body') throw new Error('note text mismatch');
    upsertedNoteId = row.id;
    // Verify in notes_v2 directly
    const direct = await dbQuery(`SELECT * FROM notes_v2 WHERE id = ?`, [row.id]);
    if (!direct.length) throw new Error('row not in notes_v2');
    if (direct[0].target_kind !== 'sentence') throw new Error('target_kind not sentence');
    if (direct[0].note_type !== 'free') throw new Error('note_type not free');
  })();

  // upsert again with same (textId, sentenceId) → should UPDATE not INSERT
  await t('upsertNote on existing key updates in place (no duplicate row)', async () => {
    const r1 = await upsertNote(phB_textId, phB_sentenceId, 'Updated body v2');
    const r2 = await upsertNote(phB_textId, phB_sentenceId, 'Updated body v3');
    if (r1.id !== r2.id) throw new Error('id changed across upserts (duplicates created)');
    if (r2.note !== 'Updated body v3') throw new Error('latest body not reflected');
    const all = await dbQuery(
      `SELECT COUNT(*) AS c FROM notes_v2 WHERE text_id = ? AND target_kind = 'sentence' AND target_id = ?`,
      [phB_textId, phB_sentenceId]
    );
    if (Number(all[0].c) !== 1) throw new Error('expected 1 row, got ' + all[0].c);
  })();

  // listNotes via legacy VIEW returns the upserted note
  await t('listNotes (legacy) returns the sentence-bound free note', async () => {
    const ns = await listNotes(phB_textId);
    if (!ns.length) throw new Error('no notes returned');
    if (ns[0].note !== 'Updated body v3') throw new Error('latest body missing in VIEW');
  })();

  // searchNotes (legacy) searches body via LIKE
  await t('searchNotes (legacy) finds the upserted note via LIKE', async () => {
    const hits = await searchNotes('Updated body');
    if (!hits.length) throw new Error('search returned nothing');
    const h = hits.find(x => x.id === upsertedNoteId);
    if (!h) throw new Error('expected note not in results');
  })();

  // ── Polymorphic createNote / updateNote / deleteNoteById ─────────

  // Create a 'free' (journal) note — no target binding
  let freeNoteId;
  await t('createNote: target_kind=free, no target_id', async () => {
    const row = await createNote({
      target_kind: 'free', note_type: 'free',
      title: 'Test free journal', body: 'Just thinking aloud',
    });
    if (!row || !row.id) throw new Error('createNote returned no row');
    freeNoteId = row.id;
    if (row.target_kind !== 'free') throw new Error('target_kind wrong');
    if (row.text_id != null) throw new Error('expected null text_id for free note');
  })();

  // Create a 'word_study' templated note targeting a root
  let rootNoteId;
  await t('createNote: target_kind=root, note_type=word_study (templated body object)', async () => {
    const row = await createNote({
      target_kind: 'root', target_id: 'שלם', note_type: 'word_study',
      title: 'Root שלם — peace',
      body: {
        word: 'שלום', niqqud_variant: 'שָׁלוֹם', root: 'שלם',
        meaning: 'peace, completeness', mnemonic: '',
      },
    });
    rootNoteId = row.id;
    if (row.note_type !== 'word_study') throw new Error('note_type wrong');
    const parsed = JSON.parse(row.body_json);
    if (parsed.root !== 'שלם') throw new Error('body_json.root not preserved');
  })();

  // Snapshot semantics: createNote seeds v1 = body at creation so the
  // history sidebar shows a meaningful entry on the very first save.
  await t('createNote seeds v1 = body at creation (snapshot semantics)', async () => {
    const versions = await listNoteVersions(freeNoteId);
    if (versions.length !== 1) throw new Error('expected 1 version (v1) right after createNote, got ' + versions.length);
    if (versions[0].version !== 1) throw new Error('expected v1, got v' + versions[0].version);
    const parsed = JSON.parse(versions[0].body_json);
    if (parsed.markdown !== 'Just thinking aloud') throw new Error('v1 body does not match createNote body');
  })();

  // Snapshot semantics: v_N = body AFTER N-th save. createNote produced v1.
  // updateNote then appends v2 with the NEW body.
  await t('updateNote appends a snapshot of the new body (v_N = post-save)', async () => {
    await updateNote(freeNoteId, { body: 'Edited journal entry — first revision' });
    const versions = await listNoteVersions(freeNoteId);
    if (versions.length !== 2) throw new Error('expected 2 versions (v1 createNote + v2 updateNote), got ' + versions.length);
    // listNoteVersions returns newest first → versions[0] = v2 = new body.
    const parsedNew = JSON.parse(versions[0].body_json);
    if (parsedNew.markdown !== 'Edited journal entry — first revision') throw new Error('v2 should hold the new body');
    const parsedOrig = JSON.parse(versions[1].body_json);
    if (parsedOrig.markdown !== 'Just thinking aloud') throw new Error('v1 should hold the original body');
    if (!versions[0].diff_summary) throw new Error('diff_summary missing on v2');
  })();

  // updateNote multiple times → version count grows
  await t('updateNote: version count tracks edits (FIFO retention 50 not exceeded yet)', async () => {
    for (let i = 2; i <= 5; i++) {
      await updateNote(freeNoteId, { body: `Edited journal entry — revision ${i}` });
    }
    const versions = await listNoteVersions(freeNoteId);
    // 2 from previous test + 4 new = 6 total.
    if (versions.length !== 6) throw new Error('expected 6 versions, got ' + versions.length);
  })();

  // restoreNoteVersion — revert body, snapshot current first
  await t('restoreNoteVersion reverts body and creates a new version', async () => {
    const beforeCount = (await listNoteVersions(freeNoteId)).length;
    const restored = await restoreNoteVersion(freeNoteId, 1); // restore to v1 (= original "Just thinking aloud")
    if (!restored) throw new Error('restore returned null');
    const parsed = JSON.parse(restored.body_json);
    if (parsed.markdown !== 'Just thinking aloud') throw new Error('restore did not revert body');
    const afterCount = (await listNoteVersions(freeNoteId)).length;
    if (afterCount !== beforeCount + 1) throw new Error('expected new version after restore');
  })();

  // FIFO retention 50 — synthesize 50+ edits and verify trim
  await t('FIFO retention keeps last 50 versions per note', async () => {
    // Currently freeNoteId has 6 versions. Push to 51, expect trim to 50.
    for (let i = 0; i < 50; i++) {
      await updateNote(freeNoteId, { body: 'retention-test-' + i + '-' + Math.random() });
    }
    const versions = await listNoteVersions(freeNoteId);
    if (versions.length !== 50) throw new Error('expected exactly 50 versions, got ' + versions.length);
    // Highest version should be ≥ 51 (we created at least that many edits)
    const maxVer = Math.max(...versions.map(v => Number(v.version)));
    if (maxVer < 50) throw new Error('expected max version ≥ 50');
  })();

  // ── Polymorphic links + backlinks ─────────────────────────────────

  await t('setNoteLinks + listOutgoingLinks + listBacklinks roundtrip', async () => {
    await setNoteLinks(freeNoteId, [
      { to_kind: 'note', to_id: rootNoteId, link_alias: 'see also: root שלם' },
      { to_kind: 'root', to_id: 'שלם' },
    ]);
    const out_ = await listOutgoingLinks(freeNoteId);
    if (out_.length !== 2) throw new Error('expected 2 outgoing links, got ' + out_.length);

    const back = await listBacklinks('note', rootNoteId);
    if (!back.length) throw new Error('backlink not found from rootNoteId target');
    if (back[0].from_note_id !== freeNoteId) throw new Error('wrong backlink source');
  })();

  await t('setNoteLinks is idempotent — replacing the list', async () => {
    await setNoteLinks(freeNoteId, [{ to_kind: 'binyan', to_id: "pi'el" }]);
    const out_ = await listOutgoingLinks(freeNoteId);
    if (out_.length !== 1) throw new Error('expected 1 link after replace');
    if (out_[0].to_kind !== 'binyan') throw new Error('replace did not apply');
  })();

  // ── Roots autocomplete ────────────────────────────────────────────

  await t('seedRoots + searchRootsAutocomplete', async () => {
    await seedRoots([
      { root_3letter: 'שלם', gloss: 'peace, completeness' },
      { root_3letter: 'דבר', gloss: 'word, speech' },
      { root_3letter: 'אהב', gloss: 'love' },
    ]);
    const results = await searchRootsAutocomplete('ש');
    if (!results.length) throw new Error('autocomplete returned nothing');
    const found = results.find(r => r.root_3letter === 'שלם');
    if (!found) throw new Error('seeded root not found in autocomplete');
  })();

  // ── Smart-collections summary ─────────────────────────────────────

  await t('getNotesSmartCollectionsSummary returns counts', async () => {
    const sum = await getNotesSmartCollectionsSummary();
    if (typeof sum.total !== 'number') throw new Error('total not number');
    if (sum.total < 1) throw new Error('expected total ≥ 1 from prior tests');
  })();

  await t('getTextIdsForNotesSmartChip("with-note") includes phB_textId', async () => {
    const ids = await getTextIdsForNotesSmartChip('with-note');
    if (!Array.isArray(ids)) throw new Error('expected array');
    if (!ids.includes(phB_textId)) throw new Error('phB_textId not in with-note results');
  })();

  // ── resolveNote backwards-compat shape ────────────────────────────

  await t('resolveNote returns legacy shape for sentence-bound free note', async () => {
    const r = await resolveNote(upsertedNoteId);
    if (!r) throw new Error('not found');
    if (r.sentence_id !== phB_sentenceId) throw new Error('sentence_id missing');
    if (typeof r.note !== 'string') throw new Error('legacy `note` field missing');
    if (typeof r.text_title !== 'string') throw new Error('text_title missing');

  // H1 fix verification: concurrent updateNote calls must both succeed
  // (retry-on-UNIQUE-constraint path). Without the fix, one of the two
  // INSERTs into note_versions hit the (note_id, version) PRIMARY KEY
  // and threw. With the fix, the loser re-queries MAX and bumps version.
  await t('H1: concurrent updateNote calls do not throw (race retry)', async () => {
    const baseNote = await createNote({
      target_kind: 'free', note_type: 'free',
      title: 'H1 race test',
      body: 'baseline body',
    });
    const baseId = baseNote.id;
    if (!baseId) throw new Error('setup: createNote returned no id');
    const startCount = (await listNoteVersions(baseId)).length;

    // Fire two updateNote() in parallel — same note, different bodies.
    const [r1, r2] = await Promise.all([
      updateNote(baseId, { body: 'race body A — first update' }),
      updateNote(baseId, { body: 'race body B — second update' }),
    ]);
    if (!r1 || !r2) throw new Error('one concurrent updateNote returned null');

    const after = await listNoteVersions(baseId);
    if (after.length <= startCount) throw new Error('expected ≥1 new version row; got ' + (after.length - startCount));
    // Critical invariant: no duplicate version numbers — retry-on-conflict
    // must bump the loser.
    const versionsSet = new Set(after.map(v => v.version));
    if (versionsSet.size !== after.length) {
      throw new Error('duplicate version numbers detected — retry-on-conflict failed');
    }
    await deleteNoteById(baseId);
  })();

    if (card.entity_type !== 'note') throw new Error('expected entity_type=note');
    if (card.entity_id !== note.id) throw new Error('entity_id should match note id');
    if (card.source_note_id !== note.id) throw new Error('source_note_id should match note id');
    if (card.template_id !== 'tpl_note_word_study') throw new Error('wrong template_id: ' + card.template_id);

    const reread = await getNoteById(note.id);
    if (reread.srs_card_id !== card.id) throw new Error('note.srs_card_id should point at new card');

    // Idempotent — re-converting returns the same card.
    const again = await srs.createCardFromNote(note.id);
    if (again.id !== card.id) throw new Error('second createCardFromNote should return same card');

    // Cleanup — deleting the note SET NULLs the srs_cards back-pointer
    // (source_note_id is nullable; entity FK isn't a real FK).
    await deleteNoteById(note.id);
  })();

  await t('9.3.C: free notes refuse SRS conversion', async () => {
    const note = await createNote({
      target_kind: 'free', note_type: 'free', body: 'plain markdown',
    });
    let rejected = false;
    try { await srs.createCardFromNote(note.id); }
    catch (_) { rejected = true; }
    if (!rejected) throw new Error('createCardFromNote on free note should throw');
    await deleteNoteById(note.id);
  })();

  await t('9.3.A: invalid JSON string for templated body rejected', async () => {
    let rejected = false;
    try {
      await createNote({
        target_kind: 'free', note_type: 'word_study',
        body: 'this is not valid JSON',
      });
    } catch (e) { rejected = true; }
    if (!rejected) throw new Error('createNote should reject non-JSON string for templated body');
  })();

  // ── Phase 9.3.5 R2.1 + R3 + R4 bug-closure tests ──────────────────
  // These verify the DB-level invariants that close the 2026-05-12
  // dogfood bugs. UI-level invariants (anchor button reactivity, history
  // sidebar visibility decoupled from template form) are exercised by the
  // R6 manual smoke checklist — they have no DB surface to assert against.

  out('inf', '\n— Phase 9.3.5 R2.1/R3/R4 bug-closure suite —');

  // Test fixture: a text with 1 sentence and 5 notes spanning all 5 types.
  const r4_tid = 'r4-' + Math.random().toString(36).slice(2, 10);
  const r4_sid = 'r4s-' + Math.random().toString(36).slice(2, 10);
  let r4_freeNoteId = null;
  let r4_wordNoteId = null;
  await t('R4 fixture: text + sentence + 5 notes', async () => {
    await ldb.createText({ id: r4_tid, text_key: r4_tid, title: 'R4', source_text: 's' });
    await ldb.addSentence(r4_tid, { id: r4_sid, order_index: 0, he_plain: 's', ru: 'p' });
    const free = await createNote({ target_kind: 'sentence', target_id: r4_sid, text_id: r4_tid,
      note_type: 'free', body: { kind: 'free', markdown: 'free body first' } });
    r4_freeNoteId = free.id;
    const word = await createNote({ target_kind: 'word', target_id: r4_sid + ':0', text_id: r4_tid,
      note_type: 'word_study', body: { kind: 'word_study', word: 'shalom', meaning: 'peace' } });
    r4_wordNoteId = word.id;
    await createNote({ target_kind: 'sentence', target_id: r4_sid, text_id: r4_tid,
      note_type: 'grammar_rule', body: { kind: 'grammar_rule', rule_title: 'T', rule_body: 'r' } });
    await createNote({ target_kind: 'sentence', target_id: r4_sid, text_id: r4_tid,
      note_type: 'translation_discrepancy', body: { kind: 'translation_discrepancy', source_text: 's', translation_seen: 'a', reasoning: 'b' } });
    await createNote({ target_kind: 'sentence', target_id: r4_sid, text_id: r4_tid,
      note_type: 'pronunciation_note', body: { kind: 'pronunciation_note', word: 'shalom' } });
  })();

  // Bug 3 (2026-05-12 dogfood: free note missing from row-index list).
  // Closure: listNotesForRow sorts created_at ASC so first-created note
  // appears at the top, not the bottom.
  await t('R4 Bug 3: listNotesForRow returns all 5 notes in creation order', async () => {
    const rows = await listNotesForRow(r4_tid, r4_sid);
    if (rows.length !== 5) throw new Error('expected 5 row-notes, got ' + rows.length);
    if (rows[0].note_type !== 'free') throw new Error('first row should be the earliest-created (free), got ' + rows[0].note_type);
    // Verify monotonic created_at ASC.
    for (let i = 1; i < rows.length; i++) {
      if (String(rows[i].created_at) < String(rows[i - 1].created_at)) {
        throw new Error('rows not sorted ASC at index ' + i);
      }
    }
  })();

  // Bug 2 (2026-05-12 dogfood: row count badge disappears on page refresh
  // until the user clicks each row). Closure: getRowNoteCounts returns
  // the count in a single UNION query so the badge can be primed on text
  // load without per-row round-trips.
  await t('R4 Bug 2: getRowNoteCounts returns sentence_id → 5 in one query', async () => {
    const counts = await getRowNoteCounts(r4_tid);
    if (!Array.isArray(counts)) throw new Error('expected Array');
    if (counts.length !== 1) throw new Error('expected exactly 1 sentence with notes, got ' + counts.length);
    if (counts[0].sentence_id !== r4_sid) throw new Error('sentence_id mismatch');
    if (Number(counts[0].count) !== 5) throw new Error('expected count=5, got ' + counts[0].count);
  })();

  // Bug 2 follow-up: getRowNoteCounts covers word-target via target_id
  // prefix (substr split on ':'). Ensures word-only rows still get a badge.
  await t('R4 Bug 2: getRowNoteCounts covers word-target sids via target_id prefix', async () => {
    // Create a second sentence with only a word-target note.
    const r4_sid2 = 'r4s2-' + Math.random().toString(36).slice(2, 10);
    await ldb.addSentence(r4_tid, { id: r4_sid2, order_index: 1, he_plain: 's2', ru: 'p2' });
    await createNote({ target_kind: 'word', target_id: r4_sid2 + ':0', text_id: r4_tid,
      note_type: 'word_study', body: { kind: 'word_study', word: 'X', meaning: 'Y' } });
    const counts = await getRowNoteCounts(r4_tid);
    const row = counts.find(c => c.sentence_id === r4_sid2);
    if (!row) throw new Error('word-only sentence missing from counts');
    if (Number(row.count) !== 1) throw new Error('expected word-only count=1, got ' + row.count);
  })();

  // R3 Convert: snapshot semantics. Pre-convert body must be archived as
  // a new note_versions row before body_json is blanked. (Closes Bug 1.3
  // at the DB layer — old body never leaks into the new shape on save.)
  await t('R4 R3: convertNoteType snapshots old body to versions before blanking', async () => {
    const versionsBefore = await listNoteVersions(r4_freeNoteId);
    const verCountBefore = versionsBefore.length;

    const converted = await convertNoteType(r4_freeNoteId, 'word_study');
    if (converted.note_type !== 'word_study') throw new Error('note_type not updated');
    const parsed = JSON.parse(converted.body_json);
    if (parsed.kind !== 'word_study') throw new Error('blank body should advertise new kind');
    if (parsed.markdown) throw new Error('blank body must not retain old markdown field');

    const versionsAfter = await listNoteVersions(r4_freeNoteId);
    if (versionsAfter.length !== verCountBefore + 1) {
      throw new Error('expected exactly one new version row, got ' + (versionsAfter.length - verCountBefore));
    }
    const latest = versionsAfter[0]; // listNoteVersions sorts version DESC
    const archived = JSON.parse(latest.body_json);
    if (archived.markdown !== 'free body first') {
      throw new Error('archived snapshot should be the pre-convert free body, got ' + JSON.stringify(archived));
    }
  })();

  // R3 Convert: target_kind / target_id stay untouched. Convert changes
  // content shape, not anchoring.
  await t('R4 R3: convertNoteType preserves target_kind and target_id', async () => {
    const before = await getNoteById(r4_wordNoteId);
    const converted = await convertNoteType(r4_wordNoteId, 'grammar_rule');
    if (converted.target_kind !== before.target_kind) throw new Error('target_kind changed');
    if (converted.target_id !== before.target_id) throw new Error('target_id changed');
  })();

  // R3 Convert: same-type is a no-op (returns current row unchanged).
  await t('R4 R3: convertNoteType to current type is a no-op', async () => {
    const before = await getNoteById(r4_wordNoteId);
    const versionsBefore = await listNoteVersions(r4_wordNoteId);
    const after = await convertNoteType(r4_wordNoteId, before.note_type);
    const versionsAfter = await listNoteVersions(r4_wordNoteId);
    if (after.note_type !== before.note_type) throw new Error('type changed on no-op');
    if (versionsAfter.length !== versionsBefore.length) throw new Error('no-op should not create a version row');
  })();

  // R3 Convert: srs_card_id stays linked (warn is UI-only).
  await t('R4 R3: convertNoteType keeps srs_card_id link intact', async () => {
    const note = await createNote({ target_kind: 'sentence', target_id: r4_sid, text_id: r4_tid,
      note_type: 'word_study', body: { kind: 'word_study', word: 'k', meaning: 'm' } });
    const card = await srs.createCardFromNote(note.id);
    const before = await getNoteById(note.id);
    if (before.srs_card_id !== card.id) throw new Error('precondition failed: card not linked');
    const converted = await convertNoteType(note.id, 'grammar_rule');
    if (converted.srs_card_id !== card.id) {
      throw new Error('srs_card_id was dropped on convert (R3 spec violation)');
    }
    await deleteNoteById(note.id);
  })();

  // R4 Bug 1.1 + 1.2 — UI-level, no DB surface. We assert the relevant
  // helpers exist on window when this page is loaded inside the main app
  // shell (which is not the case here — notes-v2-test.html is standalone).
  // So we only sanity-check the helpers are exported from local-db.js.
  await t('R4: convertNoteType / listNotesForRow / getRowNoteCounts are exported', async () => {
    if (typeof convertNoteType !== 'function') throw new Error('convertNoteType missing');
    if (typeof listNotesForRow !== 'function') throw new Error('listNotesForRow missing');
    if (typeof getRowNoteCounts !== 'function') throw new Error('getRowNoteCounts missing');
  })();

  // Cleanup
  await t('R4 cleanup: deleteText cascades R2.1/R3/R4 fixture', async () => {
    await deleteText(r4_tid);
  })();

  // Cleanup
  await t('cleanup: deleteText cascades phase 9.1.B test data', async () => {
    await deleteText(phB_textId);
  })();

  // Summary
  out('inf', '\n— Summary —');
  out(fail ? 'err' : 'ok', `Passed: ${pass} · Failed: ${fail}`);
}

run().catch(e => out('err', '❌ Suite crashed: ' + e.message));
</script>
</body>
</html>
