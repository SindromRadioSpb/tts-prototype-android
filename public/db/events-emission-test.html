<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Events Emission Test (Phase 11.0)</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #e0e0e0; max-width: 1100px; margin: 0 auto; }
    h2 { color: #fbbf24; }
    .ok  { color: #4ade80; }
    .err { color: #f87171; }
    .inf { color: #60a5fa; }
    .warn { color: #fbbf24; }
    pre  { margin: 4px 0 4px 20px; color: #94a3b8; white-space: pre-wrap; }
    table { border-collapse: collapse; margin-top: 12px; }
    th, td { border: 1px solid #334155; padding: 6px 10px; }
    th { background: #1e293b; color: #fbbf24; }
  </style>
</head>
<body>
<h2>Events Emission Test — Phase 11.0 (Direction 11A)</h2>
<p class="inf">Verifies all 12 event types defined in <code>docs/CONTRACTS_ANALYTICS.md § 0</code> can be emitted, persisted, and queried correctly. Uses the same OPFS DB as the main app.</p>
<div id="log"></div>

<script type="module">
import {
  initLocalDB, recordEvent, getAnalytics, getActivityHeatmap, recentActivity,
  getActiveMsReal, getActiveMinutesByDay, getSessionMetrics,
} from '/db/local-db.js';

const log = document.getElementById('log');
function out(cls, msg, extra) {
  const p = document.createElement('p');
  p.className = cls;
  p.textContent = msg;
  log.appendChild(p);
  if (extra != null) {
    const pre = document.createElement('pre');
    pre.textContent = typeof extra === 'object' ? JSON.stringify(extra, null, 2) : String(extra);
    log.appendChild(pre);
  }
}

async function run() {
  let pass = 0, fail = 0;
  const t = (name, fn) => async () => {
    try {
      await fn();
      pass++;
      out('ok', '✅ ' + name);
    } catch (e) {
      fail++;
      out('err', '❌ ' + name + ' — ' + (e && e.message ? e.message : String(e)));
    }
  };

  // Init
  try {
    out('inf', 'Initializing OPFS + wa-sqlite...');
    await initLocalDB();
    out('ok', '✅ DB ready');
  } catch (e) {
    out('err', '❌ Init failed: ' + e.message);
    return;
  }

  // For verification — inspect what's in events table after each emit.
  // We need a cheap query helper; recordEvent is exported but not q().
  // Workaround: we count by emitting then reading via getAnalytics or
  // by injecting a custom marker into payload_json.
  const testRunId = 'test-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);

  // Common helper: emit event with marker, then later we'll filter by it.
  async function emit(eventType, payload) {
    await recordEvent({
      event_type: eventType,
      ...payload,
      payload_json: { ...(payload.payload_json || {}), __test_run: testRunId },
    });
  }

  // ── Tests for all 12 event types ─────────────────────────────────────
  await t('emit text_open', async () => {
    await emit('text_open', { text_id: 'fake-txt-1', source: 'library' });
  })();

  await t('emit text_close', async () => {
    await emit('text_close', { text_id: 'fake-txt-1', payload_json: { duration_ms: 12345 } });
  })();

  await t('emit play_audio', async () => {
    await emit('play_audio', {
      text_id: 'fake-txt-1', sentence_id: 'fake-sent-1', source: 'fake-asset-key',
      payload_json: { duration_ms: 4200, replay_count: 1 },
    });
  })();

  await t('emit play_audio (replay 2)', async () => {
    await emit('play_audio', {
      text_id: 'fake-txt-1', sentence_id: 'fake-sent-1', source: 'fake-asset-key',
      payload_json: { duration_ms: 4200, replay_count: 2 },
    });
  })();

  await t('emit save_note', async () => {
    await emit('save_note', {
      text_id: 'fake-txt-1', sentence_id: 'fake-sent-2',
      payload_json: { note_kind: 'free', body_length: 87 },
    });
  })();

  await t('emit note_edit', async () => {
    await emit('note_edit', {
      text_id: 'fake-txt-1', sentence_id: 'fake-sent-2',
      payload_json: { chars_added: 24, chars_removed: 8, body_length: 103 },
    });
  })();

  await t('emit srs_review', async () => {
    await emit('srs_review', {
      card_id: 'fake-card-1', text_id: 'fake-txt-1', sentence_id: 'fake-sent-3',
      session_id: 'fake-session-1',
      payload_json: {
        grade: 3, interval_before_days: 1, interval_after_days: 4,
        state_before: 'learning', state_after: 'review',
        ease_before: 2.5, ease_after: 2.5,
      },
    });
  })();

  await t('emit srs_session_started', async () => {
    await emit('srs_session_started', { session_id: 'fake-session-2' });
  })();

  await t('emit srs_session_finished', async () => {
    await emit('srs_session_finished', {
      session_id: 'fake-session-2',
      payload_json: { duration_ms: 180000, cards_reviewed: 12 },
    });
  })();

  await t('emit search_query', async () => {
    await emit('search_query', {
      payload_json: { query_length: 7, result_count: 12, scope: 'both' },
    });
  })();

  await t('emit smart_tag_override', async () => {
    await emit('smart_tag_override', {
      text_id: 'fake-txt-1', payload_json: { tag: 'struggling' },
    });
  })();

  await t('emit translit_toggle', async () => {
    await emit('translit_toggle', { payload_json: { visible: false } });
  })();

  // ── Privacy invariants ───────────────────────────────────────────────
  await t('search_query payload contains NO query string', async () => {
    // Defensive — confirm caller did NOT pass a query field; emit doesn't
    // strip, so this is a contract reminder, not enforcement.
    const fakeBadEmit = { payload_json: { query_length: 5, result_count: 3 } };
    if ('query' in (fakeBadEmit.payload_json || {})) throw new Error('query string leaked');
  })();

  // ── Analytics aggregation still works ────────────────────────────────
  await t('getAnalytics returns shape with plays/unique_rows/unique_texts/time_ms', async () => {
    const ag = await getAnalytics({ days: 7 });
    if (!ag || !ag.ok) throw new Error('getAnalytics returned !ok');
    if (typeof ag.period.plays !== 'number') throw new Error('missing plays');
    if (typeof ag.period.unique_rows !== 'number') throw new Error('missing unique_rows');
    if (typeof ag.period.unique_texts !== 'number') throw new Error('missing unique_texts');
    if (typeof ag.period.time_ms !== 'number') throw new Error('missing time_ms');
    // Phase 11.1: also surfaces active_ms_real
    if (typeof ag.period.active_ms_real !== 'number') throw new Error('missing active_ms_real');
  })();

  await t('getActivityHeatmap returns date-bucketed counts', async () => {
    const heat = await getActivityHeatmap(7);
    if (!Array.isArray(heat)) throw new Error('expected array');
    if (heat.length === 0) throw new Error('expected at least 1 day');
    if (!heat[0].date || typeof heat[0].count !== 'number') throw new Error('bad bucket shape');
  })();

  // ── Phase 11.1 — session events + heartbeat aggregation ──────────────
  // Emit a synthetic session: start + 3 heartbeats + end with duration.
  // Then verify aggregation helpers return sensible values.
  const synSessionId = 'syn-sess-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);

  await t('emit session_start', async () => {
    await emit('session_start', {
      session_id: synSessionId,
      payload_json: { app_version: '3.2.0-test', platform: 'web/desktop' },
    });
  })();

  await t('emit 3 session_heartbeats', async () => {
    for (let i = 0; i < 3; i++) {
      await emit('session_heartbeat', { session_id: synSessionId });
    }
  })();

  await t('emit session_end with duration_ms', async () => {
    await emit('session_end', {
      session_id: synSessionId,
      payload_json: { duration_ms: 105000, reason: 'explicit' },
    });
  })();

  await t('getActiveMsReal returns non-negative number', async () => {
    const ms = await getActiveMsReal({});
    if (typeof ms !== 'number') throw new Error('expected number');
    if (ms < 0) throw new Error('negative ms');
    out('inf', `   getActiveMsReal (all-time) = ${Math.round(ms / 1000)}s`);
  })();

  await t('getActiveMsReal sees the synthetic session contribution (≈105s)', async () => {
    // Capture baseline before, then re-query after emit
    // Strictly: we already emitted; just check current value > 0
    const ms = await getActiveMsReal({});
    // We expect at least ~105s from the synthetic session (with end
    // duration overriding the heartbeat baseline).
    if (ms < 30000) throw new Error('expected ≥ 30s; got ' + ms);
  })();

  await t('getActiveMinutesByDay returns array of len=30 (zero-filled)', async () => {
    const arr = await getActiveMinutesByDay({ days: 30 });
    if (!Array.isArray(arr)) throw new Error('expected array');
    if (arr.length !== 30) throw new Error('expected 30 buckets, got ' + arr.length);
    if (!arr[0].date || typeof arr[0].active_minutes !== 'number') throw new Error('bad bucket shape');
    out('inf', `   today=${arr[arr.length - 1].date} active_minutes=${arr[arr.length - 1].active_minutes}`);
  })();

  await t('getSessionMetrics returns sessions_count + active_ms_real', async () => {
    const m = await getSessionMetrics({ days: 7 });
    if (typeof m.sessions_count !== 'number') throw new Error('missing sessions_count');
    if (typeof m.heartbeats_count !== 'number') throw new Error('missing heartbeats_count');
    if (typeof m.active_ms_real !== 'number') throw new Error('missing active_ms_real');
    out('inf', `   metrics: ${JSON.stringify(m)}`);
  })();

  await t('orphan session: heartbeats × 30s when no session_end', async () => {
    const orphanId = 'orphan-' + Date.now();
    await emit('session_start', { session_id: orphanId });
    await emit('session_heartbeat', { session_id: orphanId });
    await emit('session_heartbeat', { session_id: orphanId });
    // No session_end fired
    const ms = await getActiveMsReal({});
    if (ms < 90000) throw new Error('orphan session not counted (got ' + ms + ')');
  })();

  // ── Summary ──────────────────────────────────────────────────────────
  out('inf', `\n— Summary —`);
  out(fail ? 'err' : 'ok', `Passed: ${pass} · Failed: ${fail}`);
  out('inf', `Test run id: ${testRunId} (events tagged with this in payload_json.__test_run for cleanup)`);
}

run().catch(e => out('err', '❌ Suite crashed: ' + e.message));
</script>
</body>
</html>
