<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LinguistPro — Читальный зал</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/icons/icon-192.png">
  <meta name="theme-color" content="#0f172a">
  <!-- BRR-P0-002b: shared reader-table fidelity (niqqud/RTL/buttons) + Hebrew webfont, extracted from index.html. -->
  <link rel="preload" href="/fonts/frank-ruhl-libre-400.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/css/reader-core.css">
  <style>
    /* ── Reading Room theme (focused subset; auto light/dark) ─────────────── */
    :root {
      --bg-page: #f4f6f9;
      --bg-card: #ffffff;
      --bg-muted: #eef2f7;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-faint: #94a3b8;
      --border-soft: #e2e8f0;
      --accent: #2563eb;
      --accent-contrast: #ffffff;
      --shadow: 0 1px 3px rgba(15, 23, 42, .08), 0 1px 2px rgba(15, 23, 42, .04);
    }
    @media (prefers-color-scheme: dark) {
      body:not(.theme-light) {
        --bg-page: #0f172a;
        --bg-card: #1e293b;
        --bg-muted: #243349;
        --text-primary: #f1f5f9;
        --text-secondary: #cbd5e1;
        --text-faint: #7c8ba3;
        --border-soft: #334155;
        --accent: #60a5fa;
        --accent-contrast: #0b1220;
        --shadow: 0 1px 3px rgba(0, 0, 0, .4);
      }
    }
    body.theme-dark {
      --bg-page: #0f172a; --bg-card: #1e293b; --bg-muted: #243349;
      --text-primary: #f1f5f9; --text-secondary: #cbd5e1; --text-faint: #7c8ba3;
      --border-soft: #334155; --accent: #60a5fa; --accent-contrast: #0b1220;
      --shadow: 0 1px 3px rgba(0, 0, 0, .4);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-text-size-adjust: 100%;
    }

    /* ── header / sub-brand ──────────────────────────────────────────────── */
    .room-header {
      position: sticky; top: 0; z-index: 10;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-soft);
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
      padding-top: calc(12px + env(safe-area-inset-top, 0px));
    }
    .room-header-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .room-title { margin: 0; font-size: 19px; font-weight: 700; line-height: 1.2; }
    .room-subtitle { margin: 3px 0 0; font-size: 12.5px; color: var(--text-secondary); line-height: 1.35; }
    .room-lang {
      flex: none; appearance: none; background: var(--bg-muted); color: var(--text-primary);
      border: 1px solid var(--border-soft); border-radius: 8px; padding: 6px 10px; font-size: 13px;
    }

    /* ── track tabs ──────────────────────────────────────────────────────── */
    .room-tabs { display: flex; gap: 8px; margin-top: 12px; }
    .room-tab {
      flex: 1; appearance: none; cursor: pointer;
      background: var(--bg-muted); color: var(--text-secondary);
      border: 1px solid var(--border-soft); border-radius: 999px;
      padding: 9px 12px; font-size: 14px; font-weight: 600;
      transition: background .15s, color .15s, border-color .15s;
    }
    .room-tab[aria-selected="true"] {
      background: var(--accent); color: var(--accent-contrast); border-color: var(--accent);
    }

    /* ── shelves ─────────────────────────────────────────────────────────── */
    main { padding: 14px 0 32px; }
    .shelf { margin: 0 0 22px; }
    .shelf-head { padding: 0 16px; }
    .shelf-title { margin: 0; font-size: 16px; font-weight: 700; }
    .shelf-intro { margin: 3px 0 0; font-size: 13px; color: var(--text-secondary); line-height: 1.4; }

    /* horizontal carousel — RTL inherits direction from <html dir> */
    .shelf-rail {
      display: flex; gap: 10px; overflow-x: auto; scroll-snap-type: x mandatory;
      padding: 12px 16px 4px; margin: 0;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .shelf-rail::-webkit-scrollbar { display: none; }

    .work-card {
      flex: 0 0 auto; width: 132px; min-height: 92px; scroll-snap-align: start;
      background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 12px;
      box-shadow: var(--shadow); cursor: pointer; text-align: start; text-decoration: none;
      padding: 12px; display: flex; flex-direction: column; justify-content: space-between; gap: 8px;
      transition: transform .1s ease, border-color .15s; font: inherit; color: var(--text-primary);
    }
    .work-card:active { transform: scale(.97); }
    .work-card[disabled] { cursor: default; opacity: .55; }
    .work-card-title {
      font-size: 17px; font-weight: 600; line-height: 1.25; color: var(--text-primary);
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    /* Hebrew title gets a touch larger + proper bidi isolation */
    .work-card-title[dir="rtl"] { font-size: 18px; }
    .work-card-cta { font-size: 12px; font-weight: 600; color: var(--accent); }
    .work-card[disabled] .work-card-cta { color: var(--text-faint); }

    /* ── BRR-P0-005 provenance / honesty badges ───────────────────────────── */
    .work-card-author {
      font-size: 12px; color: var(--text-secondary); line-height: 1.25;
      display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
    }
    .work-card-meta { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
    .prov-badge {
      font-size: 10px; font-weight: 700; line-height: 1; padding: 3px 6px; border-radius: 999px;
      white-space: nowrap; border: 1px solid transparent;
    }
    /* honest labels: amber = machine, indigo = machine-assisted, green = proofread */
    .prov-badge.rs-machine { background: #fef3c7; color: #92400e; border-color: #fde68a; }
    .prov-badge.rs-machine_assisted { background: #e0e7ff; color: #3730a3; border-color: #c7d2fe; }
    .prov-badge.rs-human_proofread { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
    .prov-badge.audio-none { background: var(--bg-muted); color: var(--text-faint); border-color: var(--border-soft); }
    .prov-badge.audio-tts { background: #e0f2fe; color: #075985; border-color: #bae6fd; }
    .prov-badge.audio-human { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
    @media (prefers-color-scheme: dark) {
      body:not(.theme-light) .prov-badge.rs-machine { background: rgba(245,158,11,.18); color: #fcd34d; border-color: rgba(245,158,11,.4); }
      body:not(.theme-light) .prov-badge.rs-machine_assisted { background: rgba(99,102,241,.2); color: #c7d2fe; border-color: rgba(99,102,241,.4); }
      body:not(.theme-light) .prov-badge.rs-human_proofread { background: rgba(34,197,94,.18); color: #bbf7d0; border-color: rgba(34,197,94,.4); }
      body:not(.theme-light) .prov-badge.audio-tts { background: rgba(14,165,233,.2); color: #bae6fd; border-color: rgba(14,165,233,.4); }
      body:not(.theme-light) .prov-badge.audio-human { background: rgba(34,197,94,.18); color: #bbf7d0; border-color: rgba(34,197,94,.4); }
    }
    body.theme-dark .prov-badge.rs-machine { background: rgba(245,158,11,.18); color: #fcd34d; border-color: rgba(245,158,11,.4); }
    body.theme-dark .prov-badge.rs-machine_assisted { background: rgba(99,102,241,.2); color: #c7d2fe; border-color: rgba(99,102,241,.4); }
    body.theme-dark .prov-badge.rs-human_proofread { background: rgba(34,197,94,.18); color: #bbf7d0; border-color: rgba(34,197,94,.4); }
    body.theme-dark .prov-badge.audio-tts { background: rgba(14,165,233,.2); color: #bae6fd; border-color: rgba(14,165,233,.4); }
    body.theme-dark .prov-badge.audio-human { background: rgba(34,197,94,.18); color: #bbf7d0; border-color: rgba(34,197,94,.4); }

    /* ── states ──────────────────────────────────────────────────────────── */
    .room-state {
      margin: 48px auto; max-width: 320px; padding: 0 24px; text-align: center;
      color: var(--text-secondary); font-size: 14px; line-height: 1.5;
    }
    .room-state-icon { font-size: 34px; display: block; margin-bottom: 10px; opacity: .8; }

    /* ── embedded reader (BRR-P0-002b Stage 1) ───────────────────────────────── */
    #roomReader[hidden] { display: none; }
    .reader-bar {
      position: sticky; top: 0; z-index: 10; background: var(--bg-card);
      border-bottom: 1px solid var(--border-soft);
      padding: 10px 12px; padding-top: calc(10px + env(safe-area-inset-top, 0px));
      display: flex; align-items: center; gap: 10px;
    }
    .reader-back, .reader-aids-toggle {
      flex: none; appearance: none; cursor: pointer; background: var(--bg-muted);
      color: var(--text-primary); border: 1px solid var(--border-soft);
      border-radius: 8px; padding: 7px 11px; font-size: 14px; font-weight: 600;
    }
    .reader-aids-toggle[aria-expanded="true"] { background: var(--accent); color: var(--accent-contrast); border-color: var(--accent); }
    .reader-title {
      flex: 1; min-width: 0; margin: 0; font-size: 15px; font-weight: 700; line-height: 1.25;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .reader-aids {
      border-bottom: 1px solid var(--border-soft); background: var(--bg-muted);
      padding: 10px 12px; display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: center; font-size: 13px;
    }
    .reader-aids[hidden] { display: none; }
    .reader-aids label { display: inline-flex; align-items: center; gap: 5px; color: var(--text-secondary); cursor: pointer; }
    .reader-aids select {
      appearance: none; background: var(--bg-card); color: var(--text-primary);
      border: 1px solid var(--border-soft); border-radius: 7px; padding: 5px 8px; font-size: 13px;
    }
    .reader-table-wrap { padding: 12px; overflow-x: auto; }
    .reader-table-wrap .room-state { margin: 40px auto; }
    /* Room reader is read-only: hide Studio row affordances (mirrors index.html room-mode). */
    #roomReader .row-note-btn, #roomReader .row-edit-actions { display: none !important; }
  </style>
</head>
<body>

<header class="room-header">
  <div class="room-header-row">
    <div>
      <h1 class="room-title" data-i18n="room.header.title">📖 Читальный зал</h1>
      <p class="room-subtitle" data-i18n="room.header.subtitle">Двуязычная библиотека</p>
    </div>
    <select id="roomLang" class="room-lang" aria-label="Язык / Language / שפה">
      <option value="ru">Рус</option>
      <option value="en">Eng</option>
      <option value="he">עב</option>
    </select>
  </div>
  <div class="room-tabs" id="roomTabs" role="tablist">
    <button class="room-tab" id="tabAccessible" role="tab" aria-selected="true" data-track="accessible" data-i18n="room.tabs.accessible">Доступная</button>
    <button class="room-tab" id="tabLiterary" role="tab" aria-selected="false" data-track="literary" data-i18n="room.tabs.literary">Литературная</button>
  </div>
</header>

<main id="roomContent">
  <div class="room-state" data-i18n="room.state.loading">Загрузка…</div>
</main>

<!-- BRR-P0-002b: same-document embedded reader (warm-worker open). Hidden until a work-card opens it. -->
<section id="roomReader" hidden aria-label="Reader">
  <div class="reader-bar">
    <button id="readerBack" class="reader-back" type="button" data-i18n="room.reader.back">← Полки</button>
    <h2 id="readerTitle" class="reader-title"></h2>
    <button id="readerAidsToggle" class="reader-aids-toggle" type="button" aria-expanded="false" aria-controls="readerAids" data-i18n-title="room.reader.aids" title="Настройки чтения">Аа</button>
  </div>
  <div id="readerAids" class="reader-aids" hidden></div>
  <div id="roomReaderTable" class="reader-table-wrap"></div>
</section>

<!-- i18n: locales BEFORE core (sets <html dir> for Hebrew) -->
<script src="/i18n/locales/ru.js"></script>
<script src="/i18n/locales/en.js"></script>
<script src="/i18n/locales/he.js"></script>
<script src="/i18n/index.js"></script>

<!-- JSZip (precached) — used by library-ui.js to unzip the shipped canon bundle on first visit. -->
<script src="/db/jszip.min.js"></script>
<script type="module" src="/js/library-ui.js"></script>
</body>
</html>
