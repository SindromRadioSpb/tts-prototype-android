<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LinguistPro — Читальный зал</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/icons/icon-192.png">
  <meta name="theme-color" content="#0f172a">
  <!-- BRR-P0-002b: shared reader-table fidelity (niqqud/RTL/buttons) + Hebrew webfont, extracted from index.html. -->
  <link rel="preload" href="/fonts/frank-ruhl-libre-400.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/css/reader-core.css">
  <style>
    /* ── Reading Room theme (focused subset; auto light/dark) ─────────────── */
    :root {
      --bg-page: #f4f6f9;
      --bg-card: #ffffff;
      --bg-muted: #eef2f7;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-faint: #94a3b8;
      --border-soft: #e2e8f0;
      --accent: #2563eb;
      --accent-contrast: #ffffff;
      --shadow: 0 1px 3px rgba(15, 23, 42, .08), 0 1px 2px rgba(15, 23, 42, .04);
    }
    @media (prefers-color-scheme: dark) {
      body:not(.theme-light) {
        --bg-page: #0f172a;
        --bg-card: #1e293b;
        --bg-muted: #243349;
        --text-primary: #f1f5f9;
        --text-secondary: #cbd5e1;
        --text-faint: #7c8ba3;
        --border-soft: #334155;
        --accent: #60a5fa;
        --accent-contrast: #0b1220;
        --shadow: 0 1px 3px rgba(0, 0, 0, .4);
      }
    }
    body.theme-dark {
      --bg-page: #0f172a; --bg-card: #1e293b; --bg-muted: #243349;
      --text-primary: #f1f5f9; --text-secondary: #cbd5e1; --text-faint: #7c8ba3;
      --border-soft: #334155; --accent: #60a5fa; --accent-contrast: #0b1220;
      --shadow: 0 1px 3px rgba(0, 0, 0, .4);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-text-size-adjust: 100%;
    }

    /* ── header / sub-brand ──────────────────────────────────────────────── */
    .room-header {
      position: sticky; top: 0; z-index: 10;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-soft);
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
      padding-top: calc(12px + env(safe-area-inset-top, 0px));
    }
    .room-header-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .room-title { margin: 0; font-size: 19px; font-weight: 700; line-height: 1.2; }
    .room-subtitle { margin: 3px 0 0; font-size: 12.5px; color: var(--text-secondary); line-height: 1.35; }
    .room-lang {
      flex: none; appearance: none; background: var(--bg-muted); color: var(--text-primary);
      border: 1px solid var(--border-soft); border-radius: 8px; padding: 6px 10px; font-size: 13px;
    }
    .room-head-controls { display: flex; align-items: center; gap: 8px; flex: none; }
    .room-theme-btn {
      flex: none; appearance: none; cursor: pointer; width: auto; line-height: 1; font-size: 15px;
      background: var(--bg-muted); color: var(--text-primary); border: 1px solid var(--border-soft);
      border-radius: 8px; padding: 6px 9px;
    }
    .room-theme-btn:hover { border-color: var(--accent); }

    /* ── track tabs ──────────────────────────────────────────────────────── */
    .room-tabs { display: flex; gap: 8px; margin-top: 12px; }
    .room-tab {
      flex: 1; appearance: none; cursor: pointer;
      background: var(--bg-muted); color: var(--text-secondary);
      border: 1px solid var(--border-soft); border-radius: 999px;
      padding: 9px 12px; font-size: 14px; font-weight: 600;
      transition: background .15s, color .15s, border-color .15s;
    }
    .room-tab[aria-selected="true"] {
      background: var(--accent); color: var(--accent-contrast); border-color: var(--accent);
    }

    /* ── shelves ─────────────────────────────────────────────────────────── */
    main { padding: 14px 0 32px; }
    .shelf { margin: 0 0 22px; }
    .shelf-head { padding: 0 16px; }
    .shelf-title { margin: 0; font-size: 16px; font-weight: 700; }
    .shelf-intro { margin: 3px 0 0; font-size: 13px; color: var(--text-secondary); line-height: 1.4; }

    /* horizontal carousel — RTL inherits direction from <html dir> */
    .shelf-rail {
      display: flex; gap: 10px; overflow-x: auto; scroll-snap-type: x mandatory;
      padding: 12px 16px 4px; margin: 0;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .shelf-rail::-webkit-scrollbar { display: none; }

    .work-card {
      flex: 0 0 auto; width: 132px; min-height: 92px; scroll-snap-align: start;
      background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 12px;
      box-shadow: var(--shadow); cursor: pointer; text-align: start; text-decoration: none;
      padding: 12px; display: flex; flex-direction: column; justify-content: space-between; gap: 8px;
      transition: transform .1s ease, border-color .15s; font: inherit; color: var(--text-primary);
    }
    .work-card:active { transform: scale(.97); }
    .work-card[disabled] { cursor: default; opacity: .55; }
    .work-card-title {
      font-size: 17px; font-weight: 600; line-height: 1.25; color: var(--text-primary);
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    /* Hebrew title gets a touch larger + proper bidi isolation */
    .work-card-title[dir="rtl"] { font-size: 18px; }
    .work-card-cta { font-size: 12px; font-weight: 600; color: var(--accent); }
    .work-card[disabled] .work-card-cta { color: var(--text-faint); }

    /* ── BRR-P0-005 provenance / honesty badges ───────────────────────────── */
    .work-card-author {
      font-size: 12px; color: var(--text-secondary); line-height: 1.25;
      display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
    }
    .work-card-meta { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
    .prov-badge {
      font-size: 10px; font-weight: 700; line-height: 1; padding: 3px 6px; border-radius: 999px;
      white-space: nowrap; border: 1px solid transparent;
    }
    /* honest labels: amber = machine, indigo = machine-assisted, green = proofread */
    .prov-badge.rs-machine { background: #fef3c7; color: #92400e; border-color: #fde68a; }
    .prov-badge.rs-machine_assisted { background: #e0e7ff; color: #3730a3; border-color: #c7d2fe; }
    .prov-badge.rs-human_proofread { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
    .prov-badge.audio-none { background: var(--bg-muted); color: var(--text-faint); border-color: var(--border-soft); }
    .prov-badge.audio-tts { background: #e0f2fe; color: #075985; border-color: #bae6fd; }
    .prov-badge.audio-human { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
    @media (prefers-color-scheme: dark) {
      body:not(.theme-light) .prov-badge.rs-machine { background: rgba(245,158,11,.18); color: #fcd34d; border-color: rgba(245,158,11,.4); }
      body:not(.theme-light) .prov-badge.rs-machine_assisted { background: rgba(99,102,241,.2); color: #c7d2fe; border-color: rgba(99,102,241,.4); }
      body:not(.theme-light) .prov-badge.rs-human_proofread { background: rgba(34,197,94,.18); color: #bbf7d0; border-color: rgba(34,197,94,.4); }
      body:not(.theme-light) .prov-badge.audio-tts { background: rgba(14,165,233,.2); color: #bae6fd; border-color: rgba(14,165,233,.4); }
      body:not(.theme-light) .prov-badge.audio-human { background: rgba(34,197,94,.18); color: #bbf7d0; border-color: rgba(34,197,94,.4); }
    }
    body.theme-dark .prov-badge.rs-machine { background: rgba(245,158,11,.18); color: #fcd34d; border-color: rgba(245,158,11,.4); }
    body.theme-dark .prov-badge.rs-machine_assisted { background: rgba(99,102,241,.2); color: #c7d2fe; border-color: rgba(99,102,241,.4); }
    body.theme-dark .prov-badge.rs-human_proofread { background: rgba(34,197,94,.18); color: #bbf7d0; border-color: rgba(34,197,94,.4); }
    body.theme-dark .prov-badge.audio-tts { background: rgba(14,165,233,.2); color: #bae6fd; border-color: rgba(14,165,233,.4); }
    body.theme-dark .prov-badge.audio-human { background: rgba(34,197,94,.18); color: #bbf7d0; border-color: rgba(34,197,94,.4); }

    /* ── BRR-P1-007 S3 — i+1 coverage badge (soft estimate) + reading-load flag ── */
    /* green = i+1 sweet spot (80–95%) · sky = mastered (≥95%) · slate = many unknowns (<80%) */
    .prov-badge.coverage-in { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
    .prov-badge.coverage-easy { background: #e0f2fe; color: #075985; border-color: #bae6fd; }
    .prov-badge.coverage-hard { background: var(--bg-muted); color: var(--text-secondary); border-color: var(--border-soft); }
    .prov-badge.coverage-load { background: #faf5ff; color: #6b21a8; border-color: #e9d5ff; }
    @media (prefers-color-scheme: dark) {
      body:not(.theme-light) .prov-badge.coverage-in { background: rgba(34,197,94,.18); color: #bbf7d0; border-color: rgba(34,197,94,.4); }
      body:not(.theme-light) .prov-badge.coverage-easy { background: rgba(14,165,233,.2); color: #bae6fd; border-color: rgba(14,165,233,.4); }
      body:not(.theme-light) .prov-badge.coverage-hard { background: var(--bg-muted); color: var(--text-faint); border-color: var(--border-soft); }
      body:not(.theme-light) .prov-badge.coverage-load { background: rgba(168,85,247,.18); color: #e9d5ff; border-color: rgba(168,85,247,.4); }
    }
    body.theme-dark .prov-badge.coverage-in { background: rgba(34,197,94,.18); color: #bbf7d0; border-color: rgba(34,197,94,.4); }
    body.theme-dark .prov-badge.coverage-easy { background: rgba(14,165,233,.2); color: #bae6fd; border-color: rgba(14,165,233,.4); }
    body.theme-dark .prov-badge.coverage-hard { background: var(--bg-muted); color: var(--text-faint); border-color: var(--border-soft); }
    body.theme-dark .prov-badge.coverage-load { background: rgba(168,85,247,.18); color: #e9d5ff; border-color: rgba(168,85,247,.4); }

    /* BRR-P1-007 S4 — the personalized «Следующий для тебя» rail title reads as "yours" (accent). */
    .shelf.corpus-nextforyou .shelf-title { color: var(--accent); }

    /* ── BRR-P1-015 A3 — Корпус drill (Период→Автор→Работа) ──────────────────── */
    .corpus-nav { padding-bottom: 8px; }

    /* breadcrumb (sticky under the tabs) */
    .corpus-crumb {
      display: flex; align-items: center; gap: 10px; padding: 10px 16px;
      position: sticky; top: 0; z-index: 5; background: var(--bg-page); border-bottom: 1px solid var(--border-soft);
    }
    .corpus-back {
      flex: none; appearance: none; cursor: pointer; background: var(--bg-muted); color: var(--text-primary);
      border: 1px solid var(--border-soft); border-radius: 8px; padding: 6px 11px; font-size: 15px; font-weight: 700; line-height: 1;
    }
    .corpus-crumb-trail { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; min-width: 0; font-size: 14px; }
    .corpus-crumb-part {
      appearance: none; background: none; border: none; padding: 0; margin: 0; font: inherit; cursor: pointer;
      color: var(--accent); font-weight: 600;
    }
    .corpus-crumb-part.leaf { color: var(--text-primary); cursor: default; font-weight: 700; }
    .corpus-crumb-sep { color: var(--text-faint); }

    /* period grid (2-up @380px) */
    .corpus-period-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px 16px 4px; }
    .period-card {
      background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 12px; box-shadow: var(--shadow);
      cursor: pointer; padding: 12px; display: flex; flex-direction: column; gap: 7px; transition: transform .1s ease, border-color .15s;
    }
    .period-card:active { transform: scale(.98); }
    .period-card-titlerow { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
    .period-card-title { font-size: 15px; font-weight: 700; line-height: 1.2; }
    .period-card-range { font-size: 11.5px; color: var(--text-faint); font-variant-numeric: tabular-nums; white-space: nowrap; }
    .period-card-gloss {
      font-size: 12px; color: var(--text-secondary); line-height: 1.35;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .period-card-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-top: auto; }
    .period-chip { font-size: 10.5px; font-weight: 700; line-height: 1; padding: 3px 7px; border-radius: 999px; white-space: nowrap; }
    .period-chip.ready { background: #dcfce7; color: #166534; }
    .period-chip.later { background: var(--bg-muted); color: var(--text-faint); }
    .period-chip.muted { background: var(--bg-muted); color: var(--text-secondary); }

    /* author list (lean rows, graduated order) */
    .corpus-list-head { padding: 12px 16px 4px; }
    .corpus-list-count { font-size: 13px; font-weight: 700; color: var(--text-secondary); }
    .corpus-author-row {
      display: flex; align-items: center; justify-content: space-between; gap: 12px; cursor: pointer;
      padding: 13px 16px; border-bottom: 1px solid var(--border-soft);
    }
    .corpus-author-row:active { background: var(--bg-muted); }
    .corpus-author-name { font-size: 15px; font-weight: 600; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .corpus-author-meta { flex: none; display: flex; align-items: center; gap: 8px; font-variant-numeric: tabular-nums; }
    .corpus-author-ready { font-size: 12px; font-weight: 700; color: #166534; }
    .corpus-author-works { font-size: 13px; color: var(--text-faint); }

    /* work rows + sections (ready / catalog-later) */
    .corpus-work-section { margin-top: 6px; }
    .corpus-section-head { display: flex; align-items: center; gap: 7px; padding: 12px 16px 6px; }
    .corpus-section-icon { font-size: 14px; }
    .corpus-section-title { font-size: 13px; font-weight: 700; color: var(--text-secondary); }
    .corpus-section-count { font-size: 12px; color: var(--text-faint); }
    .corpus-work-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border-soft); }
    .corpus-work-row[role="button"] { cursor: pointer; }
    .corpus-work-row[role="button"]:active { background: var(--bg-muted); }
    .corpus-work-row.is-later { opacity: .72; }
    .corpus-work-col { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 5px; }
    .corpus-work-title {
      font-size: 15px; font-weight: 600; line-height: 1.25;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .corpus-work-meta { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
    .corpus-work-len { font-size: 11px; color: var(--text-faint); font-weight: 600; font-variant-numeric: tabular-nums; }
    .corpus-work-genre { font-size: 11px; color: var(--text-secondary); font-weight: 600; }
    .corpus-work-cta { flex: none; font-size: 16px; color: var(--accent); }
    .corpus-work-row.is-later .corpus-work-cta { color: var(--text-faint); }
    .prov-badge.later {
      background: var(--bg-muted); color: var(--text-faint); border-color: var(--border-soft);
      font-size: 10px; font-weight: 700; line-height: 1; padding: 3px 6px; border-radius: 999px;
    }

    /* incremental reveal */
    .corpus-more { padding: 12px 16px; }
    .corpus-more-btn {
      width: 100%; appearance: none; cursor: pointer; background: var(--bg-muted); color: var(--accent);
      border: 1px solid var(--border-soft); border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 600;
    }
    .corpus-more-btn:active { background: var(--border-soft); }

    /* dark-mode greens (mirror prov-badge pattern) */
    @media (prefers-color-scheme: dark) {
      body:not(.theme-light) .period-chip.ready { background: rgba(34,197,94,.18); color: #bbf7d0; }
      body:not(.theme-light) .corpus-author-ready { color: #bbf7d0; }
    }
    body.theme-dark .period-chip.ready { background: rgba(34,197,94,.18); color: #bbf7d0; }
    body.theme-dark .corpus-author-ready { color: #bbf7d0; }

    /* ── A3 Slice 2 — global search + facets + L2 sort/jump-bar ─────────────── */
    .corpus-filterbar { padding: 12px 16px 4px; display: flex; flex-direction: column; gap: 8px; }
    .corpus-search-input {
      width: 100%; appearance: none; -webkit-appearance: none; font: inherit;
      background: var(--bg-card); color: var(--text-primary);
      border: 1px solid var(--border-soft); border-radius: 10px; padding: 10px 12px; font-size: 15px;
    }
    .corpus-search-input:focus { outline: none; border-color: var(--accent); }
    .corpus-facets { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .corpus-facet-chip {
      appearance: none; cursor: pointer; background: var(--bg-muted); color: var(--text-secondary);
      border: 1px solid var(--border-soft); border-radius: 999px; padding: 7px 12px; font-size: 13px; font-weight: 600;
    }
    .corpus-facet-chip.on { background: var(--accent); color: var(--accent-contrast); border-color: var(--accent); }
    .corpus-facet-chip.clear { color: var(--text-faint); }
    .corpus-facet-select {
      display: inline-flex; align-items: center; background: var(--bg-muted);
      border: 1px solid var(--border-soft); border-radius: 999px; overflow: hidden;
    }
    .corpus-facet-select.on { border-color: var(--accent); }
    .corpus-facet-select select {
      appearance: none; -webkit-appearance: none; background: transparent; color: var(--text-secondary);
      border: none; padding: 7px 12px; font-size: 13px; font-weight: 600; max-width: 46vw; font-family: inherit;
    }
    .corpus-facet-select.on select { color: var(--accent); }
    .corpus-facet-select select:focus { outline: none; }

    /* results */
    .corpus-results-summary { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; padding: 12px 16px 6px; }
    .corpus-results-label { font-size: 13px; font-weight: 700; color: var(--text-secondary); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .corpus-results-count { flex: none; font-size: 13px; color: var(--text-faint); font-variant-numeric: tabular-nums; }
    .corpus-work-author {
      font-size: 12px; color: var(--text-secondary); line-height: 1.2;
      display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
    }
    /* BRR-S4 — inline ✕ clear inside the search input */
    .corpus-search-wrap { position: relative; display: flex; }
    .corpus-search-wrap .corpus-search-input { flex: 1; padding-inline-end: 36px; }
    .corpus-search-clear {
      position: absolute; inset-inline-end: 4px; top: 50%; transform: translateY(-50%);
      width: auto; appearance: none; cursor: pointer; background: transparent; border: 0;
      color: var(--text-faint); font-size: 15px; line-height: 1; padding: 8px;
    }
    .corpus-search-clear[hidden] { display: none; }
    .corpus-search-clear:active { color: var(--text-secondary); }
    /* BRR-S1 — bilingual snippet of the matched line under a search-result row (ready hits only) */
    .corpus-work-snippet {
      margin-top: 4px; padding: 7px 10px; border-radius: 8px; background: var(--bg-muted);
      border-inline-start: 2px solid var(--border-soft);
    }
    .corpus-snippet-he { font-size: 13px; line-height: 1.55; color: var(--text-primary); }
    .corpus-snippet-ru { font-size: 12px; line-height: 1.4; color: var(--text-secondary); margin-top: 2px; }
    /* BRR-S2 — niqqud-insensitive query highlight (amber, distinct from the row-jump tint; no underline → никуд-safe) */
    mark.fts-mark { background: rgba(255, 184, 28, 0.34); color: inherit; border-radius: 3px; padding: 0 1px; }
    @media (prefers-color-scheme: dark) { body:not(.theme-light) mark.fts-mark { background: rgba(255, 199, 72, 0.30); } }
    body.theme-dark mark.fts-mark { background: rgba(255, 199, 72, 0.30); }

    /* L2 sort toggle (segmented) */
    .corpus-list-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px 16px 4px; }
    .corpus-sort { display: flex; gap: 4px; background: var(--bg-muted); border-radius: 999px; padding: 2px; flex: none; }
    .corpus-sort-btn {
      appearance: none; cursor: pointer; background: transparent; color: var(--text-secondary);
      border: none; border-radius: 999px; padding: 5px 11px; font-size: 12px; font-weight: 600; white-space: nowrap;
    }
    .corpus-sort-btn.on { background: var(--bg-card); color: var(--accent); box-shadow: var(--shadow); }
    /* BRR-P2-004 — L3 work sort + genre filter controls */
    .corpus-work-controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 4px 16px 10px; }
    .corpus-work-genre {
      width: auto; appearance: none; cursor: pointer; background: var(--bg-card); color: var(--text-primary);
      border: 1px solid var(--border-soft); border-radius: 999px; padding: 5px 11px; font-size: 12px; font-weight: 600;
    }

    /* Hebrew jump-bar */
    .corpus-jumpbar { display: flex; flex-wrap: wrap; gap: 2px; padding: 6px 12px 8px; justify-content: center; }
    .corpus-jump {
      appearance: none; cursor: pointer; background: transparent; color: var(--accent);
      border: none; border-radius: 6px; min-width: 22px; padding: 4px 2px; font-size: 14px; font-weight: 700; line-height: 1;
    }
    .corpus-jump:active { background: var(--bg-muted); }
    .corpus-jump.off { color: var(--text-faint); opacity: .4; cursor: default; }

    /* ── states ──────────────────────────────────────────────────────────── */
    .room-state {
      margin: 48px auto; max-width: 320px; padding: 0 24px; text-align: center;
      color: var(--text-secondary); font-size: 14px; line-height: 1.5;
    }
    .room-state-icon { font-size: 34px; display: block; margin-bottom: 10px; opacity: .8; }

    /* ── embedded reader (BRR-P0-002b Stage 1) ───────────────────────────────── */
    #roomReader[hidden] { display: none; }
    .reader-bar {
      position: sticky; top: 0; z-index: 10; background: var(--bg-card);
      border-bottom: 1px solid var(--border-soft);
      padding: 10px 12px; padding-top: calc(10px + env(safe-area-inset-top, 0px));
      display: flex; align-items: center; gap: 10px;
    }
    .reader-back, .reader-aids-toggle {
      flex: none; appearance: none; cursor: pointer; background: var(--bg-muted);
      color: var(--text-primary); border: 1px solid var(--border-soft);
      border-radius: 8px; padding: 7px 11px; font-size: 14px; font-weight: 600;
    }
    .reader-aids-toggle[aria-expanded="true"] { background: var(--accent); color: var(--accent-contrast); border-color: var(--accent); }
    .reader-title {
      flex: 1; min-width: 0; margin: 0; font-size: 15px; font-weight: 700; line-height: 1.25;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .reader-aids {
      border-bottom: 1px solid var(--border-soft); background: var(--bg-muted);
      padding: 10px 12px; display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: center; font-size: 13px;
    }
    .reader-aids[hidden] { display: none; }
    .reader-aids label { display: inline-flex; align-items: center; gap: 5px; color: var(--text-secondary); cursor: pointer; }
    .reader-aids-hint { flex-basis: 100%; font-size: 11px; line-height: 1.4; color: var(--text-faint); margin-top: -2px; }
    .reader-aids-info { color: var(--text-faint); cursor: help; font-size: 12px; margin-inline-start: 2px; }
    .reader-aids select {
      appearance: none; background: var(--bg-card); color: var(--text-primary);
      border: 1px solid var(--border-soft); border-radius: 7px; padding: 5px 8px; font-size: 13px;
    }
    .reader-table-wrap { padding: 12px; overflow-x: auto; }
    .reader-table-wrap .room-state { margin: 40px auto; }
    /* BRR-P2-002 «Продолжить чтение» — non-jumping resume affordance (sits under the sticky bar). */
    .reader-resume {
      position: sticky; top: 0; z-index: 9; display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; background: var(--bg-muted); border-bottom: 1px solid var(--border-soft);
      font-size: 13px; color: var(--text-secondary);
    }
    .reader-resume-msg { flex: 1; min-width: 0; }
    .reader-resume button { width: auto; flex: none; appearance: none; cursor: pointer; border-radius: 7px; font: inherit; }
    .reader-resume-go { background: var(--accent); color: var(--accent-contrast); border: 0; padding: 6px 13px; font-size: 13px; font-weight: 600; }
    .reader-resume-x { background: transparent; border: 0; color: var(--text-faint); font-size: 16px; padding: 4px 6px; line-height: 1; }
    /* «Продолжить чтение» shelf card — a % progress chip in lieu of provenance badges. */
    .continue-card .continue-pct { background: var(--accent); color: var(--accent-contrast); border: 0; }
    /* BRR-P2-003 — per-row ☆/★ bookmark control (Room-only; injected into the action cell). */
    #roomReader .col-action-row-bm { margin-top: 2px; display: flex; justify-content: center; }
    #roomReader .row-bookmark-btn {
      width: auto; appearance: none; cursor: pointer; background: transparent; border: 0;
      color: var(--text-faint); font-size: 17px; line-height: 1; padding: 2px 4px;
    }
    #roomReader .row-bookmark-btn.bookmarked { color: var(--accent); }
    #roomReader .row-bookmark-btn:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--accent); border-radius: 4px; }
    /* «🔖 Закладки» shelf card — the saved passage snippet wraps (up to 3 lines). */
    .bookmark-card .bookmark-snippet {
      white-space: normal; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden; font-size: 13px; line-height: 1.35;
    }
    /* BRR-P2-001/006 — full-text «в тексте» group (phrase + scattered-words sub-groups). The
       BRR-P2-001 «по форме слова» badge was retired in P2-006: content words are lemma-only by
       design, so it lit on every content hit and signalled nothing — honest grouping replaced it. */
    .corpus-fts-group { margin-top: 14px; }
    /* BRR-P2-006a — full-text search loading affordance (the index lazy-loads its shards; without a
       cue the user reads the title-match count «0» as «nothing found»). Spinner + honest text. */
    .corpus-fts-loading { display: flex; align-items: center; gap: 9px; margin: 16px 2px; color: var(--text-secondary); font-size: 13px; }
    .corpus-fts-spinner { width: 15px; height: 15px; border-radius: 50%; border: 2px solid var(--border-soft); border-top-color: var(--accent); animation: ftsspin .7s linear infinite; flex: 0 0 auto; }
    @keyframes ftsspin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .corpus-fts-spinner { animation-duration: 1.6s; } }
    /* BRR-P2-005 — unified jump-highlight (resume / bookmark / FTS hit): a soft AMBER tint on the
       whole row (both language columns) + a leading accent bar, persistent until the next user
       interaction. Amber is distinct from the Room's BLUE playback highlight; theme-independent
       (like the karaoke word marker). a11y: the bar is a non-colour second channel (WCAG 1.4.1)
       at ≥3:1; no underline (никуд-safe). Playback/error win the cascade. */
    #roomReaderTable tr.rm-row-jump:not(.row-playing):not(.row-error) td,
    #roomReaderTable tr.rm-row-jump:not(.row-playing):not(.row-error) td.rtl {
      background-color: rgba(255, 184, 28, 0.20) !important;
      transition: background-color 180ms ease;
    }
    #roomReaderTable tr.rm-row-jump:not(.row-playing):not(.row-error) td:first-child {
      box-shadow: inset 3px 0 0 #f59e0b;
    }
    /* Room reader is read-only: hide Studio row affordances (mirrors index.html room-mode). */
    #roomReader .row-note-btn, #roomReader .row-edit-actions { display: none !important; }

    /* ── morphology-on-tap (BRR-P1-011) ──────────────────────────────────────── */
    /* Tappable Hebrew word spans (post-render wrap; no size change → no layout shift). */
    .rm-w { cursor: pointer; border-radius: 3px; transition: background .12s ease; }
    .rm-w:hover { background: var(--bg-muted); }
    .rm-w:focus { outline: none; background: var(--bg-muted); }
    .rm-w:focus-visible { box-shadow: 0 0 0 2px var(--accent); }
    .rm-w-active { background: var(--accent); color: var(--accent-contrast); }
    /* BRR-P1-006 — progressive translation reveal: ru cells blurred until tapped (active recall). */
    #roomReaderTable td[data-col="ru"].ru-veiled { filter: blur(5px); cursor: pointer; user-select: none; transition: filter .15s ease; }
    #roomReaderTable td[data-col="ru"].ru-veiled.ru-revealed { filter: none; user-select: text; }
    /* BRR-P1-006 — one-time discoverability pulse on the reading-settings («Аа») button. */
    @keyframes aidsPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(90,155,255,0); } 50% { box-shadow: 0 0 0 4px rgba(90,155,255,.4); } }
    .reader-aids-toggle.aids-hint { animation: aidsPulse 1.6s ease-in-out 3; }
    /* Light bottom-sheet card */
    .rm-sheet { position: fixed; inset: 0; z-index: 1000; }
    .rm-sheet[hidden] { display: none; }
    .rm-sheet-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.45); }
    .rm-sheet-card {
      position: absolute; left: 0; right: 0; bottom: 0; max-width: 560px; margin: 0 auto;
      background: var(--bg-card); color: var(--text-primary);
      border-top-left-radius: 16px; border-top-right-radius: 16px; border-top: 1px solid var(--border-soft);
      padding: 18px 16px calc(16px + env(safe-area-inset-bottom, 0px));
      max-height: 72vh; overflow-y: auto; box-shadow: 0 -8px 30px rgba(0,0,0,.32);
      transform: translateY(100%); transition: transform .22s ease;
    }
    .rm-sheet.rm-open .rm-sheet-card { transform: translateY(0); }
    @media (prefers-reduced-motion: reduce) { .rm-sheet-card { transition: none; } }
    .rm-sheet-x {
      position: absolute; top: 12px; left: 12px; appearance: none; cursor: pointer;
      background: var(--bg-muted); border: 1px solid var(--border-soft); color: var(--text-secondary);
      border-radius: 8px; width: 30px; height: 30px; font-size: 14px; line-height: 1;
    }
    .rm-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; padding-inline-end: 36px; }
    .rm-word { font-size: 27px; font-weight: 700; line-height: 1.2; }
    .rm-prov { flex: none; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
    .rm-prov-exact { background: rgba(46,160,67,.16); color: #3fb950; }
    .rm-prov-likely { background: rgba(56,139,253,.16); color: #5a9bff; }
    .rm-prov-guessed, .rm-prov-unknown { background: rgba(210,153,34,.16); color: #d29922; }
    .rm-prov-function { background: var(--bg-muted); color: var(--text-secondary); }
    .rm-prov-context { background: rgba(163,113,247,.18); color: #a371f7; }
    .rm-meaning { font-size: 16px; line-height: 1.4; color: var(--text-primary); margin-bottom: 12px; }
    .rm-meaning-empty { color: var(--text-faint); font-style: italic; }
    .rm-rows { display: flex; flex-direction: column; gap: 6px; }
    .rm-row { display: flex; gap: 10px; font-size: 14px; }
    .rm-k { flex: none; min-width: 88px; color: var(--text-secondary); }
    .rm-v { color: var(--text-primary); font-weight: 600; }
    .rm-v[lang="he"] { font-size: 18px; }
    .rm-actions { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; }
    .rm-link {
      display: inline-block; padding: 9px 13px; border-radius: 8px; text-decoration: none;
      background: var(--bg-muted); color: var(--text-primary); border: 1px solid var(--border-soft);
      font-size: 13px; font-weight: 600;
    }
    .rm-link:hover { background: var(--accent); color: var(--accent-contrast); border-color: var(--accent); }
    .rm-loading, .rm-card-empty { color: var(--text-secondary); font-size: 14px; padding: 14px 2px; }
    /* lifecycle + save (BRR-P1-009 note-capture) */
    .rm-badges { display: inline-flex; flex-direction: column; align-items: flex-end; gap: 5px; flex: none; }
    .rm-life { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px; white-space: nowrap; background: var(--bg-muted); color: var(--text-secondary); }
    .rm-life[hidden] { display: none; }
    .rm-life-known { background: rgba(46,160,67,.16); color: #3fb950; }
    .rm-life-learning { background: rgba(56,139,253,.16); color: #5a9bff; }
    .rm-life-in_anki { background: rgba(163,113,247,.16); color: #a371f7; }
    .rm-life-suspended { background: var(--bg-muted); color: var(--text-faint); }
    .rm-save {
      appearance: none; cursor: pointer; border: 1px solid var(--accent); border-radius: 8px;
      background: var(--accent); color: var(--accent-contrast); font-size: 13px; font-weight: 700; padding: 9px 14px;
    }
    .rm-save:disabled { opacity: .6; cursor: default; }
    .rm-save-done { background: var(--bg-muted); color: var(--text-secondary); border-color: var(--border-soft); }
    /* word-status colouring in the reading text (LingQ-style, subtle) */
    /* BRR-P1-009 word-status — FILL (highlighter), not underline (R4: clearer at a glance @380px,
       LingQ-parity; underline collided with low niqqud marks). Calibrated: known calm, new/learning
       brighter (attention flows to what you don't know). .rm-w padding keeps fills from touching. */
    .rm-w-known { background: rgba(63,185,80,.15); border-radius: 3px; }
    .rm-w-learning { background: rgba(210,153,34,.22); border-radius: 3px; }
    .rm-w-new { background: rgba(90,155,255,.20); border-radius: 3px; }
    .rm-w.rm-w-active { background: var(--accent); color: var(--accent-contrast); }   /* tapped word wins over fill */
    /* BRR-P1-008 karaoke — stronger "current line" while reading aloud (reuses .row-playing). */
    #roomReaderTable.karaoke-on tr.row-playing:not(.row-error) td { background: rgba(90,155,255,.16); }
    /* BRR-P1-008b — the word being spoken now: a WARM "spotlight" pill, theme-independent and
       high-contrast, deliberately distinct from the cool-blue karaoke line so it never blends
       (light OR dark theme). Fixed colours (not --accent) guarantee contrast on any background. */
    #roomReaderTable .rm-w.rm-w-speaking {
      background: #f7b733; color: #1a1205; font-weight: 700; border-radius: 4px;
      box-shadow: 0 0 0 2px rgba(247,183,51,.45);   /* soft glow — spotlight, no motion */
    }
    @media (prefers-reduced-motion: no-preference) {
      #roomReaderTable .rm-w.rm-w-speaking { transition: background-color .1s ease, box-shadow .1s ease; }
    }
    /* transient toast */
    .room-toast {
      position: fixed; left: 50%; bottom: calc(20px + env(safe-area-inset-bottom, 0px));
      transform: translate(-50%, 12px); background: var(--text-primary); color: var(--bg-card);
      padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; max-width: 90vw;
      text-align: center; opacity: 0; pointer-events: none; z-index: 1200; transition: opacity .2s, transform .2s;
    }
    .room-toast.show { opacity: 1; transform: translate(-50%, 0); }
    /* ── BRR chrome: SW-update toast + footer + «О Зале» modal ─────────────────── */
    .room-update-toast {
      position: fixed; left: 50%; bottom: calc(64px + env(safe-area-inset-bottom, 0px)); transform: translateX(-50%);
      background: #1f2937; color: #fff; border-radius: 10px; padding: 10px 12px 10px 16px; font-size: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,.25); z-index: 1300; display: flex; align-items: center; gap: 10px; max-width: 92vw;
    }
    .room-update-toast button { width: auto; border: 0; border-radius: 6px; cursor: pointer; font-size: 13px; padding: 6px 12px; }
    .room-update-toast .ru-upd { background: var(--accent); color: var(--accent-contrast); font-weight: 700; }
    .room-update-toast .ru-later { background: transparent; color: #9ca3af; padding: 6px 10px; }
    .room-footer {
      display: flex; flex-wrap: wrap; justify-content: space-between; gap: 8px 16px;
      padding: 16px 16px calc(16px + env(safe-area-inset-bottom, 0px)); margin-top: 8px;
      border-top: 1px solid var(--border-soft); background: var(--bg-muted); font-size: 12px; color: var(--text-secondary);
    }
    .room-footer-left, .room-footer-right { display: flex; flex-wrap: wrap; align-items: center; gap: 6px 14px; }
    .room-footer a { color: var(--text-secondary); text-decoration: none; cursor: pointer; }
    .room-footer a:hover { color: var(--text-primary); text-decoration: underline; }
    .room-privacy-badge { background: rgba(63,185,80,.12); border-radius: 999px; padding: 3px 10px; }
    .room-footer-version { color: var(--text-faint); cursor: pointer; }
    .room-about { position: fixed; inset: 0; z-index: 1400; display: flex; align-items: center; justify-content: center; }
    .room-about[hidden] { display: none; }
    .room-about-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.45); }
    .room-about-card {
      position: relative; background: var(--bg-card); color: var(--text-primary); border-radius: 14px;
      max-width: 460px; width: calc(100vw - 32px); max-height: 80vh; overflow-y: auto; padding: 20px 18px; box-shadow: 0 12px 40px rgba(0,0,0,.3);
    }
    .room-about-card h2 { margin: 0 0 10px; font-size: 18px; }
    .room-about-card p { margin: 0 0 10px; font-size: 14px; line-height: 1.5; color: var(--text-secondary); }
    .room-about-x { position: absolute; top: 10px; inset-inline-end: 12px; width: auto; background: transparent; border: 0; font-size: 18px; color: var(--text-faint); cursor: pointer; }
    .room-about-version { margin-top: 12px; font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .room-about-update button { width: auto; background: var(--accent); color: var(--accent-contrast); border: 0; border-radius: 6px; padding: 5px 12px; font-size: 13px; cursor: pointer; }
    /* Stage 2 — rich card: collapsible root-family + ported Pealim inflection table */
    .rm-acc { margin-top: 12px; border-top: 1px solid var(--border-soft); padding-top: 8px; }
    .rm-acc-sum { cursor: pointer; font-size: 13px; font-weight: 700; color: var(--text-secondary); list-style: none; padding: 4px 0; }
    .rm-acc-sum::-webkit-details-marker { display: none; }
    .rm-acc-sum::before { content: "▸ "; opacity: .6; }
    .rm-acc[open] > .rm-acc-sum::before { content: "▾ "; }
    .rm-rootfam { display: flex; flex-wrap: wrap; gap: 6px; padding: 6px 0 2px; }
    .rm-rootfam-chip {
      appearance: none; cursor: pointer; width: auto; font-size: 16px; font-weight: 600;
      background: var(--bg-muted); color: var(--text-primary); border: 1px solid var(--border-soft);
      border-radius: 8px; padding: 5px 11px;
    }
    .rm-rootfam-chip:hover { border-color: var(--accent); }
    /* ported .v3-conj-* (Pealim table) — adapted to Room dark vars */
    .rm-conj-body { margin-top: 6px; }
    .rm-conj-body .v3-conj-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 6px 10px; margin-bottom: 6px; }
    .rm-conj-body .v3-conj-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 7px; background: #0F766E; color: #fff; white-space: nowrap; }
    .rm-conj-body .v3-conj-recheck { font-size: 11.5px; font-weight: 600; color: var(--accent); text-decoration: none; }
    .rm-conj-body .v3-conj-recheck:hover { text-decoration: underline; }
    .rm-conj-body .v3-conj-rootlabel { font-size: 11px; color: var(--text-secondary); font-weight: 600; }
    .rm-conj-body .v3-conj-gizra { font-size: 11px; color: var(--text-faint); }
    .rm-conj-body .v3-conj-besteffort { font-size: 11px; color: #d29922; background: rgba(210,153,34,.12); border: 1px dashed #d29922; border-radius: 7px; padding: 3px 8px; margin-bottom: 6px; }
    .rm-conj-body .v3-conj-grid { display: flex; flex-wrap: wrap; gap: 5px; }
    .rm-conj-body .v3-conj-cell {
      display: inline-flex; flex-direction: column; align-items: center; gap: 1px; min-width: 62px; width: auto;
      padding: 3px 8px; border-radius: 8px; cursor: pointer; background: var(--bg-muted);
      border: 1px solid var(--border-soft); font-family: inherit;
    }
    .rm-conj-body .v3-conj-cell:hover { border-color: var(--accent); }
    .rm-conj-body .v3-conj-cell-hl { background: rgba(240,136,62,.18); border-color: #f0883e; box-shadow: inset 0 0 0 1px #f0883e; }
    .rm-conj-body .v3-conj-cell-hl .v3-conj-he { color: #f0883e; }
    .rm-conj-body .v3-conj-he { font-size: 16px; font-weight: 600; color: var(--text-primary); direction: rtl; }
    .rm-conj-body .v3-conj-lab { font-size: 9px; font-weight: 700; color: var(--text-faint); text-transform: uppercase; letter-spacing: .02em; white-space: nowrap; }
    .rm-conj-body .v3-conj-tr { font-size: 9.5px; color: var(--text-faint); font-style: italic; }
    .rm-conj-body .v3-conj-tr .v3-conj-stress { color: #f0883e; font-weight: 700; font-style: normal; }
    .rm-conj-body .v3-conj-group { margin-top: 8px; }
    .rm-conj-body .v3-conj-group-h { font-size: 10px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .03em; margin-bottom: 4px; }
    .rm-conj-body .v3-conj-voice-h { font-size: 12px; font-weight: 800; color: var(--text-primary); margin: 12px 0 4px; padding-bottom: 3px; border-bottom: 1px solid var(--border-soft); }
    .rm-conj-body .v3-conj-note, .rm-conj-body .v3-conj-empty { font-size: 11px; color: var(--text-faint); margin-top: 6px; }
    .rm-conj-body .v3-conj-invariant { margin-top: 2px; }
    .rm-conj-body .v3-conj-cell-lg { min-width: 96px; padding: 8px 14px; }
    .rm-conj-body .v3-conj-cell-lg .v3-conj-he { font-size: 22px; }
  </style>
</head>
<body>
<!-- No-flash theme: apply the shared Studio theme choice (appTheme_v1) before paint. -->
<script>(function(){try{var t=localStorage.getItem("appTheme_v1");if(t==="light")document.body.classList.add("theme-light");else if(t==="dark")document.body.classList.add("theme-dark");}catch(_){}})();</script>

<header class="room-header">
  <div class="room-header-row">
    <div>
      <h1 class="room-title" data-i18n="room.header.title">📖 Читальный зал</h1>
      <p class="room-subtitle" data-i18n="room.header.subtitle">Двуязычная библиотека</p>
    </div>
    <div class="room-head-controls">
      <button id="roomTheme" class="room-theme-btn" type="button" aria-label="Тема" data-i18n-title="room.theme.label" title="Тема">🌗</button>
      <select id="roomLang" class="room-lang" aria-label="Язык / Language / שפה">
        <option value="ru">Рус</option>
        <option value="en">Eng</option>
        <option value="he">עב</option>
      </select>
    </div>
  </div>
  <div class="room-tabs" id="roomTabs" role="tablist">
    <button class="room-tab" id="tabAccessible" role="tab" aria-selected="true" data-track="accessible" data-i18n="room.tabs.accessible">Доступная</button>
    <button class="room-tab" id="tabLiterary" role="tab" aria-selected="false" data-track="literary" data-i18n="room.tabs.literary">Литературная</button>
    <button class="room-tab" id="tabCorpus" role="tab" aria-selected="false" data-track="corpus" data-i18n="room.tabs.corpus" hidden>Корпус</button>
  </div>
</header>

<main id="roomContent">
  <div class="room-state" data-i18n="room.state.loading">Загрузка…</div>
